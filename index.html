<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>誤字ロマの...</title>
    <link rel="icon" href="diary-icon.png" type="image/png">
    <link rel="preload" href="gojiromanus.otf" as="font" type="font/otf" crossorigin>
    <style>
        @font-face {
            font-family: 'gojiromanus';
            src: url('gojiromanus.otf') format('opentype');
            font-display: block;
        }

        * {
            font-family: 'gojiromanus', serif;
            margin: 0;
            font-weight: bold;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            cursor: default;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100svh;
            margin: 0;
            padding: 0;
            position: relative;
            color: #060029;
            background: linear-gradient(-45deg, #fbf9f5, #fde2f3, #e6f3ff, #f0f8ff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            opacity: 1;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .message {
            font-size: 3em;
            text-align: center;
            color: #5c3357;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }
    </style>
</head>

<body>
    <div class="message">次は、何をしようかな。</div>
</body>

</html>
