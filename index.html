<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f5f5f5">
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho&display=swap" rel="stylesheet">

    <title>誤字ロマの日記</title>
    <link rel="icon" href="diary-icon.png" type="image/png">
    <style>
        @font-face {
            font-family: 'gojiromanus';
            src: url('gojiromanus.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --bg-color: #f5f5f5;
            --text-color: #333333;
            --border-color: #666666;
            --timeline-color: #666666;
            --highlight-color: #cccccc;
            --icon-size: 40px;
            --modal-bg: rgba(0, 0, 0, 0.5);
            --transition: 0.2s ease;
            --light-pastel-1: #f8e8e8;
            --light-pastel-2: #e8f8f5;
            --dark-pastel-1: #2a2a3a;
            --dark-pastel-2: #1a1a2a;

        }

        /* Safariのみに適用するスタイル */
        .is-safari body,
        .is-safari .content {
            font-family: "Zen Old Mincho", serif !important;
        }

        body {
            overflow: hidden;
            font-family: "gojiromanus", serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100svh;
            margin: 0;
            padding: 0;
            position: relative;
            opacity: 0;
            transition: opacity var(--transition), background-color var(--transition);
            background-color: var(--bg-color);
            color: var(--text-color);
            background-size: 200% 200%;

        }

        body.fake-mode {
            --bg-color: #121212;
            --text-color: #e0e0e0;
        }

        .page-title {
            font-family: "gojiromanus", serif;
            text-decoration: underline;
            font-size: 22px;
            font-weight: 700;
            border-radius: 8px;
            transition: all 0.1s;
            text-decoration: none;
            user-select: none;
            z-index: 10;
            color: var(--text-color);
            padding: 5px 10px;
            position: fixed;
            top: 20px;
            right: 20px;
        }

        .page-title.fake-mode {
            color: var(--text-color);
        }

        .diary-container-wrapper {
            width: 100%;
            max-width: 90%;
            height: 78vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            box-sizing: border-box;
            margin-top: 20px;
            transition: background-color var(--transition);
        }

        .diary-container {
            overflow: hidden;
            display: flex;
            flex-direction: row;
            gap: 20px;
            width: 100%;
            height: 100%;
            padding: 0;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .diary-container::-webkit-scrollbar {
            display: none;
        }

        .diary-entry {
            writing-mode: vertical-rl;
            text-orientation: upright;
            line-height: 2;
            letter-spacing: 0.1em;
            width: auto;
            white-space: normal;
            overflow: visible;
            scroll-margin-top: 50px;
            padding: 0 10px;
            transition: all 0.3s ease;
            flex-shrink: 0;
            text-wrap: balance;
            overflow-wrap: break-word;
            background-color: transparent;
            position: relative;
        }

        .date-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            margin: 0 20px;
            flex-wrap: wrap;
            gap: 5px;
        }

        .date {
            font-family: 'Zen Old Mincho', serif;
            cursor: pointer;
            font-size: 1.6em;
            white-space: nowrap;
            position: relative;
        }

        .days-ago {
            cursor: default;
            font-size: 1.6em;
            margin-left: -3px;
            white-space: nowrap;
            opacity: 0.6;
            writing-mode: vertical-rl;
        }

        .content {
            font-size: 1.3em;
            white-space: pre-line;
            text-wrap: balance;
            overflow-wrap: break-word;
            position: relative;
            text-shadow: 0.2px 0px 1px var(--text-color);
        }

        .content.toggle-font {
            font-family: "Zen Old Mincho", serif !important;
        }

        /* 現在表示中以外のエントリを半透明に */
        .diary-entry:not(.active) {
            opacity: 0.6;
        }

        /* 現在表示中のエントリは不透明 */
        .diary-entry.active {
            opacity: 1;
        }


        .highlight {
            background-color: var(--highlight-color);
            font-weight: bold;
            padding: 0 2px;
            border-radius: 2px;
            margin: 0 -2px;
        }

        .timeline-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 0 10%;
            box-sizing: border-box;
            touch-action: none;
        }

        @media (max-width: 768px) {
            .timeline-container {
                height: 20px;
            }
        }

        .timeline {
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: row-reverse;
            justify-content: center;
            align-items: flex-end;
            height: 100%;
            width: 100%;
            transition: opacity var(--transition);
        }

        .timeline-bar {
            width: 6px;
            height: 100%;
            margin: 0 1px;
            background-color: transparent;
            display: flex;
            align-items: flex-end;
        }

        .timeline-bar-inner {
            width: 100%;
            background-color: var(--text-color);
            transition: background-color var(--transition);
            opacity: 0.2;
        }

        .timeline-bar:hover .timeline-bar-inner,
        .timeline-bar.selected .timeline-bar-inner {
            opacity: 1 !important;
        }

        .icon {
            cursor: default;
            width: var(--icon-size);
            height: var(--icon-size);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            left: 18px;
            transition: transform 0.1s, background-color var(--transition), filter var(--transition);
            border-radius: 4px;


        }

        .icon:hover {
            z-index: 20;
        }

        .icon.highlight {
            background-color: var(--highlight-color);
            filter: brightness(0.85);
        }

        .icon img,
        .icon-emoji {
            max-width: 100%;
            max-height: 100%;
            border-radius: 4px;
            font-size: x-large;
            filter: grayscale(100%);
            opacity: 0.4;
            font-size: 2em;
        }

        .icon:hover img,
        .icon:hover .icon-emoji {
            filter: grayscale(0%);
            opacity: 1;
        }

        .tooltip {
            position: absolute;
            top: -50%;
            left: 90%;
            transform: translateX(-50%);
            color: var(--text-color);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 20px;
            white-space: nowrap;
            border: none;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition);
            z-index: 30;
            margin-bottom: 5px;
        }

        .icon:hover .tooltip {
            opacity: 1;
        }

        .date .tooltip {
            position: absolute;
            writing-mode: vertical-lr;
            left: 2px;
            color: var(--text-color);
            top: 1px;
            font-size: 14px;
            opacity: 0;
            pointer-events: none;
            z-index: 30;
        }

        .date:hover .tooltip {
            opacity: 1;
        }



        .falling {
            will-change: transform, opacity;
            backface-visibility: hidden;
            /* レンダリング最適化 */
            perspective: 1000px;
            /* 3D変換のヒント */
        }


        .char.falling,
        .date.falling {
            position: fixed;
            transition: transform 2s ease-in, opacity 2s ease-out;
            will-change: transform, opacity;
            z-index: 100;
            pointer-events: none;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60%,
            80% {
                transform: translateX(-2px);
            }

            40% {
                transform: translateX(2px);
            }
        }

        .date:hover {
            animation: shake 0.3s infinite;
            animation-duration: calc(0.3s - 0.02s * var(--wind-level));
            /* 風速が強いほど速くシェイク */
        }

        .timeline-bar {
            --bar-color: var(--text-color);
            --wind-level: 1;
            width: 6px;
            height: 100%;
            margin: 0 1px;
            background-color: transparent;
            display: flex;
            align-items: flex-end;
            transition: transform 0.1s;
        }

        .timeline-bar-inner {
            width: 100%;
            background-color: var(--bar-color);
            transition: background-color var(--transition), height 0.2s;
            opacity: 0.6;
        }

        .timeline-bar:hover .timeline-bar-inner,
        .timeline-bar.selected .timeline-bar-inner {
            opacity: 1 !important;
            animation: shake-vertical calc(0.1s + 0.2s / var(--wind-level)) infinite;
        }

        @keyframes shake-vertical {

            0%,
            100% {
                transform: translateY(0);
            }

            25% {
                transform: translateY(-3px);
            }

            75% {
                transform: translateY(3px);
            }
        }



        .timeline-bar:hover,
        .timeline-bar.selected {
            transform: scaleY(1.2);
        }
    </style>

</head>

<body>
    <div class="page-title btn" id="pageTitle"></div>
    <div class="diary-container-wrapper">
        <div class="diary-container" id="diaryContainer"></div>
    </div>
    <div class="timeline-container">
        <div class="timeline" id="timeline"></div>
    </div>
    </div>
    <script>
        class DiaryUtils {
            static toKanjiNumber(num) {
                const kanjiNumbers = ['〇', '一', '二', '三', '四', '五', '六', '七', '八', '九'];
                return num.toString().split('').map(digit => kanjiNumbers[digit]).join('');
            }

            static toKanjiMonth(month) {
                const kanjiMonths = ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];
                return kanjiMonths[month - 1];
            }

            static toKanjiDay(day) {
                const days = ['', '一', '二', '三', '四', '五', '六', '七', '八', '九', '十', '十一', '十二', '十三', '十四', '十五', '十六', '十七', '十八', '十九', '二十', '二十一', '二十二', '二十三', '二十四', '二十五', '二十六', '二十七', '二十八', '二十九', '三十', '三十一'];
                return days[day];
            }

            static toJapaneseEra(year) {
                const eras = [
                    { name: '令和', start: 2019, offset: 2018 },
                    { name: '平成', start: 1989, offset: 1988 },
                    { name: '昭和', start: 1926, offset: 1925 },
                    { name: '大正', start: 1912, offset: 1911 },
                    { name: '明治', start: 1868, offset: 1867 }
                ];
                const era = eras.find(e => year >= e.start);
                const eraYear = year - era.offset;
                return `${era.name}${this.toKanjiNumber(eraYear)}年`;
            }

            static formatJapaneseDate(yyyymmdd) {
                const year = parseInt(yyyymmdd.substring(0, 4), 10);
                const month = parseInt(yyyymmdd.substring(4, 6), 10);
                const day = parseInt(yyyymmdd.substring(6, 8), 10);
                const date = new Date(year, month - 1, day);
                const dayOfWeek = ['日', '月', '火', '水', '木', '金', '土'][date.getDay()];
                return {
                    short: `${this.toKanjiMonth(month)}${this.toKanjiDay(day)}日（${DiaryApp.isFakeMode ? '裏' : dayOfWeek}）`,
                    long: `${this.toJapaneseEra(year)}${this.toKanjiMonth(month)}${this.toKanjiDay(day)}日（${DiaryApp.isFakeMode ? '裏' : dayOfWeek}）`
                };
            }

            static calculateDaysAgo(yyyymmdd) {
                const entryDate = new Date(
                    parseInt(yyyymmdd.substring(0, 4), 10),
                    parseInt(yyyymmdd.substring(4, 6), 10) - 1,
                    parseInt(yyyymmdd.substring(6, 8), 10)
                );
                const today = new Date();
                const diffTime = today - entryDate;
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                return diffDays === 0 ? '今日' : `${diffDays}日前`;
            }

            static escapeRegExp(string) {
                return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }

        }

        class DiaryApp {
            static isFakeMode = false;
            static originalEntriesOrder = [];
            static fakeEntriesCache = null;
            static diaryEntries = [];
            static iconsData = [];
            static audioContext = null;

            static async init() {
                if (/^((?!chrome|android).)*safari/i.test(navigator.userAgent)) {
                    document.documentElement.classList.add('is-safari');
                }
                await this.loadWeatherData(); // 追加
                await this.loadDiaryEntries();
                this.preloadFakeEntries();
                this.setupEventListeners();
                document.body.style.background = this.generatePastelGradient(!this.isFakeMode);
                this.updateThemeColor(!this.isFakeMode);
                document.body.style.opacity = 1;

                setTimeout(startFallingAnimation, 180000);
            }

            static generatePastelGradient(isLight) {
                // 明るいモード: 柔らかいパステルカラー
                if (isLight) {
                    const hue = Math.floor(Math.random() * 60) + 200; // 青〜紫系を基調に
                    const saturation = '80%';
                    const lightness1 = '85%';
                    const lightness2 = '95%';
                    return `linear-gradient(135deg,
            hsl(${hue}, ${saturation}, ${lightness1}),
            hsl(${hue + 30}, ${saturation}, ${lightness2}))`;
                }
                // 暗いモード: 深みのあるダークトーン
                else {
                    const hue = Math.floor(Math.random() * 60) + 200; // 青〜紫系を基調に
                    const saturation = '70%';
                    const lightness1 = '15%';
                    const lightness2 = '25%';
                    return `linear-gradient(135deg,
            hsl(${hue}, ${saturation}, ${lightness1}),
            hsl(${hue + 30}, ${saturation}, ${lightness2}))`;
                }
            }
            static updateThemeColor() {
                const metaThemeColor = document.querySelector('meta[name="theme-color"]');
                if (!metaThemeColor) return;

                // 最新のエントリの日付を取得
                const latestEntry = this.diaryEntries[this.diaryEntries.length - 1];
                if (!latestEntry) return;

                const yyyymmdd = latestEntry.yyyymmdd;
                const dateForWeather = `${yyyymmdd.substring(0, 4)}/${yyyymmdd.substring(4, 6)}/${yyyymmdd.substring(6, 8)}`;
                const weather = this.weatherData.find(w => w.date === dateForWeather);

                if (weather) {
                    // 気温に応じた色（-5°C:青、30°C:赤）
                    const temp = weather.avgTemp;
                    const red = Math.min(255, Math.floor((temp + 10) * 10));
                    const blue = Math.min(255, Math.floor((35 - temp) * 10));
                    const green = 50; // 固定値
                    metaThemeColor.setAttribute('content', `rgb(${red}, ${green}, ${blue})`);
                } else {
                    // 気温データがない場合はデフォルト色
                    metaThemeColor.setAttribute('content', this.isFakeMode ? '#121212' : '#f5f5f5');
                }
            }



            static parseCSV(csv) {
                const lines = csv.split('\n').filter(line => line.trim());
                return lines.slice(1).map(line => {
                    const [date, title, icon, url] = line.split(',').map(v => v.trim());
                    return { date, title, icon, url };
                });
            }

            static getIconsForDate(dateForIcons, keyword = '') {
                const icons = this.iconsData.filter(icon => icon.date === dateForIcons);
                if (icons.length === 0) return '';

                return icons.map(icon => {
                    const isUrl = icon.icon && (icon.icon.startsWith('http://') || icon.icon.startsWith('https://'));
                    const iconContent = isUrl
                        ? `<img src="${icon.icon}" alt="${icon.title}" class="icon-img" loading="lazy">`
                        : `<span class="icon-emoji">${icon.icon}</span>`;
                    const tooltip = icon.title ? `<div class="tooltip">${icon.title}</div>` : '';
                    const urlAttr = icon.url ? `onclick="window.open('${icon.url}', '_blank')" style="cursor: pointer;"` : '';
                    const highlightClass = keyword && icon.title.toLowerCase().includes(keyword.toLowerCase()) ? 'highlight' : '';
                    return `<div class="icon ${highlightClass}" ${urlAttr}>${iconContent}${tooltip}</div>`;
                }).join('');
            }

            static setupEventListeners() {
                const pageTitle = document.getElementById('pageTitle');
                pageTitle.addEventListener('click', () => this.toggleFakeMode());

                let pressTimer;
                pageTitle.addEventListener('mousedown', () => pressTimer = setTimeout(() => this.downloadDiaryAsText(), 1000));
                pageTitle.addEventListener('mouseup', () => clearTimeout(pressTimer));
                pageTitle.addEventListener('mouseleave', () => clearTimeout(pressTimer));

                document.addEventListener('keydown', e => this.handleKeyDown(e));
                window.addEventListener('hashchange', () => this.scrollToEntryFromHash());
                window.addEventListener('load', () => this.scrollToEntryFromHash());

            }

            static async loadDiaryEntries(filename = 'entry.md') {
                try {
                    const response = await fetch(filename);
                    if (!response.ok) throw new Error(`Failed to load ${filename}: ${response.status}`);
                    const text = await response.text();
                    this.renderEntries(text);
                } catch (error) {
                    console.error(`Error loading ${filename}:`, error);
                }
            }

            static renderEntries(text) {
                const container = document.getElementById('diaryContainer');
                if (!container) {
                    console.error("コンテナが見つかりません。");
                    return;
                }
                container.innerHTML = '';
                this.diaryEntries = [];

                const entries = text.split('---').filter(entry => entry.trim());
                entries.reverse().forEach(entry => {
                    const dateMatch = entry.match(/date:\s*(.*)/);
                    const contentMatch = entry.match(/content:\s*\|\s*\n([\s\S]*?)(?=\n---|\n$|$)/m);
                    if (!dateMatch || !contentMatch) return;

                    const yyyymmdd = dateMatch[1].trim();
                    const dateObj = DiaryUtils.formatJapaneseDate(yyyymmdd);
                    const contentLines = contentMatch[1].split('\n').map(line => line.replace(/^\s*\|?\s*/, '')).join('\n');
                    const dateForIcons = `${yyyymmdd.substring(0, 4)}/${yyyymmdd.substring(4, 6)}/${yyyymmdd.substring(6, 8)}`;

                    const entryElement = document.createElement('div');
                    entryElement.className = 'diary-entry';
                    entryElement.id = yyyymmdd;
                    entryElement.innerHTML = `
                            <div class="date-container">
                                <div class="date" data-yyyymmdd="${yyyymmdd}">${dateObj.short}</div>
                                <div class="days-ago">${DiaryUtils.calculateDaysAgo(yyyymmdd)}</div>
                            </div>
                            <div class="content">${contentLines}</div>
                        `;
                    container.appendChild(entryElement);

                    this.diaryEntries.push({
                        yyyymmdd,
                        content: contentLines.trim(),
                        icons: [] // iconsDataは使用しない
                    });
                });

                this.setupDateClick();
                this.renderTimeline();
                this.updatePageTitle(entries.length);
                this.setupContentClick();
                this.scrollToEntryFromHash();
                this.updateThemeColor();
            }

            static setupContentClick() {
                document.querySelectorAll('.content').forEach(content => {
                    let speechSynthesisUtterance = null;
                    let isCopied = false;
                    let isFontToggled = false; // フォントトグルの状態を管理

                    content.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (speechSynthesisUtterance) {
                            window.speechSynthesis.cancel();
                            speechSynthesisUtterance = null;
                            isCopied = false;
                            return;
                        }
                        if (!isCopied) {
                            const text = content.textContent;
                            navigator.clipboard.writeText(text).then(() => {
                                isCopied = true;
                                setTimeout(() => { isCopied = false; }, 2000);
                            });
                            // フォントトグル
                            isFontToggled = !isFontToggled;
                            content.classList.toggle('toggle-font', isFontToggled);
                        }
                    });

                    // 既存のダブルクリックイベントはそのまま
                    content.addEventListener('dblclick', (e) => {
                        e.stopPropagation();
                        if (speechSynthesisUtterance) {
                            window.speechSynthesis.cancel();
                            speechSynthesisUtterance = null;
                        } else {
                            const text = content.textContent;
                            speechSynthesisUtterance = new SpeechSynthesisUtterance(text);
                            speechSynthesisUtterance.onend = () => {
                                speechSynthesisUtterance = null;
                            };
                            window.speechSynthesis.speak(speechSynthesisUtterance);
                        }
                    });
                });
            }
            static setupDateClick() {
                document.querySelectorAll('.date').forEach(dateElement => {
                    const yyyymmdd = dateElement.getAttribute('data-yyyymmdd');
                    const dateForWeather = `${yyyymmdd.substring(0, 4)}/${yyyymmdd.substring(4, 6)}/${yyyymmdd.substring(6, 8)}`;
                    const weather = this.weatherData.find(w => w.date === dateForWeather);

                    // 気温に応じた色変更を削除
                    // dateElement.style.color = `rgb(${red}, 50, ${blue})`;

                    // 風速に応じた振動レベル（1〜3）はそのまま残す
                    if (weather) {
                        // 風速に応じた振動レベル（風速が強いほどシェイクが激しくなる）
                        const maxWindSpeed = 8; // 最大風速（例: 8 m/s）
                        // 風速が強いほど windLevel が大きくなる（1〜10段階）
                        const windLevel = Math.min(10, Math.max(1, Math.floor(weather.avgWind * 10 / 8))); // 最大風速8m/sに合わせる
                        dateElement.style.setProperty('--wind-level', windLevel);

                        // ツールチップを追加
                        const tooltip = document.createElement('div');
                        tooltip.className = 'tooltip';
                        tooltip.textContent = `${weather.avgTemp}°C　${weather.avgWind}m/s`;
                        dateElement.appendChild(tooltip);
                    }

                    dateElement.addEventListener('click', () => {
                        window.location.hash = dateElement.getAttribute('data-yyyymmdd');
                    });
                });
            }



            static renderTimeline() {
                const timeline = document.getElementById('timeline');
                timeline.innerHTML = '';

                if (this.diaryEntries.length === 0) return;

                const sortedEntries = [...this.diaryEntries].sort((a, b) => a.yyyymmdd.localeCompare(b.yyyymmdd));
                const contentLengths = sortedEntries.map(entry => entry.content.length);
                const maxContentLength = Math.min(this.percentile95(contentLengths), 500);
                const baseHeight = 5;
                const heightRatio = 45 / maxContentLength;

                sortedEntries.forEach(entry => {
                    const yyyymmdd = entry.yyyymmdd;
                    const dateForWeather = `${yyyymmdd.substring(0, 4)}/${yyyymmdd.substring(4, 6)}/${yyyymmdd.substring(6, 8)}`;
                    const weather = this.weatherData.find(w => w.date === dateForWeather);

                    const container = document.createElement('div');
                    container.className = 'timeline-bar';
                    container.dataset.yyyymmdd = entry.yyyymmdd;
                    container.title = `${entry.yyyymmdd}: ${entry.content.length}文字`;

                    // 気温に応じた色（-5°C:青、30°C:赤）
                    if (weather) {
                        const temp = weather.avgTemp;
                        const red = Math.min(255, Math.floor((temp + 10) * 10));
                        const blue = Math.min(255, Math.floor((35 - temp) * 10));
                        container.style.setProperty('--bar-color', `rgb(${red}, 50, ${blue})`);
                        // 風速に応じた振動レベル（1〜10段階）
                        const maxWindSpeed = 8; // 最大風速（例: 8 m/s）
                        // 風速が強いほど windLevel が大きくなる（1〜10段階）
                        const windLevel = Math.min(10, Math.max(1, Math.floor(weather.avgWind * 10 / 8))); // 最大風速8m/sに合わせる
                        container.style.setProperty('--wind-level', windLevel);
                    } else {
                        container.style.setProperty('--bar-color', 'var(--text-color)');
                        container.style.setProperty('--wind-level', 1);
                    }

                    const innerBar = document.createElement('div');
                    innerBar.className = 'timeline-bar-inner';
                    const contentLength = Math.min(entry.content.length, maxContentLength);
                    innerBar.style.height = `${Math.max(baseHeight, contentLength * heightRatio)}px`;

                    container.addEventListener('mouseover', () => {
                        window.location.hash = entry.yyyymmdd;
                        this.scrollToEntryFromHash();
                    });

                    container.addEventListener('touchstart', e => {
                        e.preventDefault();
                        window.location.hash = entry.yyyymmdd;
                        this.scrollToEntryFromHash();
                    });

                    container.appendChild(innerBar);
                    timeline.appendChild(container);
                });

                // 選択中のバーをハイライト
                const hash = window.location.hash.substring(1);
                if (hash && hash.match(/^\d{8}$/)) {
                    const selectedBar = document.querySelector(`.timeline-bar[data-yyyymmdd="${hash}"]`);
                    if (selectedBar) selectedBar.classList.add('selected');
                }

                // タッチ操作の処理（既存のまま）
                let lastHash = window.location.hash;
                timeline.addEventListener('touchmove', e => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const rect = timeline.getBoundingClientRect();
                    const x = touch.clientX - rect.left;
                    const percent = x / rect.width;
                    const index = Math.floor((1 - percent) * sortedEntries.length);

                    if (index >= 0 && index < sortedEntries.length) {
                        const newHash = sortedEntries[index].yyyymmdd;
                        if (lastHash !== `#${newHash}`) {
                            window.location.hash = newHash;
                            lastHash = `#${newHash}`;
                            this.scrollToEntryFromHash();
                        }
                    }
                });
            }

            static percentile95(arr) {
                const sorted = [...arr].sort((a, b) => a - b);
                return sorted[Math.floor(sorted.length * 0.95)];
            }

            static toggleFakeMode() {
                this.isFakeMode = !this.isFakeMode;
                const title = document.querySelector('.page-title');
                const body = document.body;

                body.style.background = this.generatePastelGradient(!this.isFakeMode);
                this.updateThemeColor(!this.isFakeMode);
                title.classList.toggle('fake-mode', this.isFakeMode);
                body.classList.toggle('fake-mode', this.isFakeMode);

                if (this.isFakeMode) {
                    if (this.fakeEntriesCache) {
                        this.renderEntries(this.fakeEntriesCache);
                    } else {
                        this.loadDiaryEntries('fake.md');
                    }
                } else {
                    this.loadDiaryEntries('entry.md');
                }
                this.updateThemeColor();
            }



            static async preloadFakeEntries() {
                try {
                    const response = await fetch('fake.md');
                    if (response.ok) this.fakeEntriesCache = await response.text();
                } catch (error) {
                    console.error('Error preloading fake entries:', error);
                }
            }
            static triggerHapticFeedback(charCount) {
                const minVibrate = 8; // 最小振動時間（ms）
                const maxVibrate = 160; // 最大振動時間（ms）

                // 文字数に応じた振動時間（1文字あたり1ms、最小20ms、最大200ms）
                const duration = Math.max(minVibrate, Math.min(maxVibrate, minVibrate + charCount));

                if ('viiibrate' in navigator) {
                    navigator.vibrate(duration);
                }
            }

            static scrollToEntryFromHash() {
                const hash = window.location.hash.substring(1);
                const entries = document.querySelectorAll('.diary-entry');
                const timelineBars = document.querySelectorAll('.timeline-bar');

                // 全てのエントリからactiveクラスを削除
                entries.forEach(entry => entry.classList.remove('active'));
                timelineBars.forEach(bar => bar.classList.remove('selected'));

                const minFreq = 320;
                const maxFreq = 3200;

                if (hash && hash.match(/^\d{8}$/)) {
                    const entry = document.getElementById(hash);
                    if (entry) {
                        entry.classList.add('active');
                        const entryRight = entry.offsetLeft + entry.clientWidth;
                        const containerWidth = document.getElementById('diaryContainer').clientWidth;
                        this.scrollTo(document.getElementById('diaryContainer'), entryRight - containerWidth);

                        // 対象エントリの文字数に応じたビープ音
                        const content = entry.querySelector('.content');
                        const charCount = content.textContent.length;
                        const freq = Math.max(minFreq, Math.min(maxFreq, minFreq + charCount * 0.5));
                        this.playBeep(freq, 0.3);
                        this.triggerHapticFeedback(charCount);

                        // 対応するタイムラインバーを選択状態に
                        const selectedBar = document.querySelector(`.timeline-bar[data-yyyymmdd="${hash}"]`);
                        if (selectedBar) selectedBar.classList.add('selected');
                    }
                } else if (entries.length > 0) {
                    const latestEntry = entries[0];
                    latestEntry.classList.add('active');
                    const entryRight = latestEntry.offsetLeft + latestEntry.clientWidth;
                    const containerWidth = document.getElementById('diaryContainer').clientWidth;
                    this.scrollTo(document.getElementById('diaryContainer'), entryRight - containerWidth);

                    // 最新エントリの文字数に応じたビープ音
                    const content = latestEntry.querySelector('.content');
                    const charCount = content.textContent.length;
                    const freq = Math.max(minFreq, Math.min(maxFreq, minFreq + charCount * 0.5));
                    this.playBeep(freq, 0.3);
                    this.triggerHapticFeedback(charCount);

                    // 最新エントリに対応するタイムラインバーを選択状態に
                    const latestEntryId = latestEntry.id;
                    const selectedBar = document.querySelector(`.timeline-bar[data-yyyymmdd="${latestEntryId}"]`);
                    if (selectedBar) selectedBar.classList.add('selected');
                }
            }


            static scrollTo(element, targetPosition) {
                element.scrollLeft = targetPosition;
            }

            static handleKeyDown(e) {
                if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                    e.preventDefault();

                    // 現在のエントリを取得
                    const currentEntry = this.getCurrentEntry();
                    if (!currentEntry) return;

                    // 現在のエントリの文字数を取得
                    const content = currentEntry.querySelector('.content');
                    const charCount = content.textContent.length;

                    // 文字数に応じた閾値を計算（例：1文字あたり0.5ms、最小62ms、最大300ms）
                    const baseThreshold = 82;
                    const maxThreshold = 370;
                    const threshold = Math.min(baseThreshold + (charCount * 0.5), maxThreshold);

                    // 最後のキー入力からの経過時間をチェック
                    if (this.lastKeyTime && Date.now() - this.lastKeyTime < threshold) return;
                    this.lastKeyTime = Date.now();

                    // 方向に応じて次のエントリを取得
                    const direction = e.key === 'ArrowLeft' ? -1 : 1;
                    const nextEntry = this.getAdjacentEntry(currentEntry, direction);
                    if (nextEntry) {
                        window.location.hash = nextEntry.id;
                        this.scrollToEntryFromHash();
                    }
                } else if (e.key === 'Escape' && window.location.hash) {
                    window.location.hash = '';
                }
            }


            static getCurrentEntry() {
                const hash = window.location.hash.substring(1);
                if (hash && hash.match(/^\d{8}$/)) return document.getElementById(hash);

                const entries = document.querySelectorAll('.diary-entry');
                return entries.length > 0 ? entries[0] : null;
            }

            static getAdjacentEntry(currentEntry, direction) {
                const entries = document.querySelectorAll('.diary-entry');
                const currentIndex = Array.from(entries).indexOf(currentEntry);
                if (currentIndex === -1) return null;

                const nextIndex = currentIndex + direction;
                if (nextIndex < 0 || nextIndex >= entries.length) return null;
                return entries[nextIndex];
            }

            static downloadDiaryAsText() {
                if (this.diaryEntries.length === 0) return alert('ダウンロードする日記がありません。');

                const sortedEntries = [...this.diaryEntries].sort((a, b) => a.yyyymmdd.localeCompare(b.yyyymmdd));
                const oldestDate = sortedEntries[0].yyyymmdd;
                const newestDate = sortedEntries[sortedEntries.length - 1].yyyymmdd;
                const modePrefix = this.isFakeMode ? '裏日記_' : '';
                const filename = `${modePrefix}誤字ロマの日記 ${oldestDate}-${newestDate}.txt`;

                let content = '';
                sortedEntries.forEach(entry => {
                    const dateObj = DiaryUtils.formatJapaneseDate(entry.yyyymmdd);
                    content += `${dateObj.long}\n${entry.content}\n\n`;
                });

                const blob = new Blob([content], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            static updatePageTitle(count) {
                const pageTitle = document.getElementById('pageTitle');
                pageTitle.textContent = `誤字ロマの${count}日間`;
            }

            static async playBeep(frequency = 440, duration = 0.1) {
                if (!this.audioContext) {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    await this.audioContext.resume();
                } else if (this.audioContext.state === 'suspended') {
                    await this.audioContext.resume();
                }

                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);

                oscillator.type = 'sine';
                oscillator.frequency.value = frequency;
                gainNode.gain.value = 0.1;
                gainNode.gain.exponentialRampToValueAtTime(0.0001, this.audioContext.currentTime + duration);

                oscillator.start();
                oscillator.stop(this.audioContext.currentTime + duration);

                // 現在のオシレーターを保存
                this.currentOscillator = oscillator;
            }


            static async loadWeatherData() {
                try {
                    const response = await fetch('data.csv');
                    if (!response.ok) throw new Error(`Failed to load data.csv: ${response.status}`);
                    const csv = await response.text();
                    this.weatherData = this.parseWeatherCSV(csv);
                } catch (error) {
                    console.error('Error loading data.csv:', error);
                    this.weatherData = []; // エラー時は空配列
                }
            }
            static parseWeatherCSV(csv) {
                const lines = csv.split('\n').filter(line => line.trim());
                return lines.slice(1).map(line => {
                    const [date, avgTemp, , , avgWind] = line.split(',').map(v => v.trim());
                    // 日付をyyyy/mm/dd形式に統一（例: 2025/12/6 → 2025/12/06）
                    const normalizedDate = date.replace(/(\d+)\/(\d+)\/(\d+)/, (_, y, m, d) =>
                        `${y}/${m.padStart(2, '0')}/${d.padStart(2, '0')}`
                    );
                    return {
                        date: normalizedDate,
                        avgTemp: parseFloat(avgTemp),
                        avgWind: parseFloat(avgWind)
                    };
                });
            }


        }

        DiaryApp.init();
        document.addEventListener('keydown', function (event) {
            // iキーが押されたかどうかを確認
            if (event.key === 'i' || event.key === 'I') {
                // 現在フォーカスされている要素がinputやtextareaでない場合のみ実行
                if (!['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) {
                    event.preventDefault(); // デフォルトの動作をキャンセル
                    window.location.href = 'write.html'; // write.htmlに遷移
                }
            }
        });


    </script>
    <script>
        const wrapCharsForFalling = () => {
            document.querySelectorAll('.content').forEach(content => {
                const text = content.textContent;
                let wrapped = '';
                for (let i = 0; i < text.length; i++) {
                    wrapped += `<span class="char">${text[i]}</span>`;
                }
                content.innerHTML = wrapped;
            });
        };

        const startFallingAnimation = () => {
            wrapCharsForFalling();
            const chars = document.querySelectorAll('.char');
            const dates = document.querySelectorAll('.date');
            const icons = document.querySelectorAll('.icon');
            const btns = document.querySelectorAll('.btn');
            const bars = document.querySelectorAll('.timeline-bar');
            const daysagos = document.querySelectorAll('.days-ago');

            const animateFalling = (element, rect) => {
                const delay = Math.random() * 1000; // 0〜1000msのランダムな遅延
                const randomXOffset = (Math.random() - 0.5) * window.innerWidth * 0.6;
                const randomYOffset = Math.random() * -window.innerHeight * 0.89;
                const startTop = window.innerHeight + randomYOffset;
                const startLeft = rect.left + randomXOffset;
                const angle = (Math.random() * 63) - 34;

                const duration = 1 + Math.random() * 100;
                const landingPosition = window.innerHeight * 0.9 + Math.random() * 1200;

                setTimeout(() => {
                    element.style.position = 'fixed';
                    element.style.left = `${startLeft}px`;
                    element.style.top = `${startTop}px`;
                    element.style.transform = `rotate(${angle}deg)`;
                    element.style.opacity = Math.random() * 0.5 + 0.5;
                    const r = Math.floor(Math.random() * 256);
                    const g = Math.floor(Math.random() * 256);
                    const b = Math.floor(Math.random() * 256);
                    element.style.color = `rgb(${r}, ${g}, ${b})`;
                    const minSize = 12; // 最小サイズ
                    const maxSize = 60; // 最大サイズ
                    const randomSize = Math.floor(Math.random() * (maxSize - minSize + 1)) + minSize;
                    element.style.fontSize = `${randomSize}px`;
                    element.style.willChange = 'transform, opacity'; // GPUアクセラレーションヒント
                    element.classList.add('falling');

                    setTimeout(() => {
                        element.style.transition = `transform ${duration}s cubic-bezier(0.4, 0, 0.2, 1)`;
                        element.style.transform = `rotate(${angle + (Math.random() * 20 - 10)}deg) translateY(${landingPosition - startTop}px)`;
                    }, 10);
                }, delay);
            };
            [chars, dates, icons, daysagos, btns, bars].forEach(elements => {
                elements.forEach(element => {
                    const rect = element.getBoundingClientRect();
                    animateFalling(element, rect);
                });
            });
        };

    </script>
