<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#07111f" />
    <title>誤字ロマの日記</title>
    <link rel="icon" href="diary-icon.png" type="image/png" />

    <style>
        @font-face {
            font-family: "gojiromanus";
            src: url("gojiromanus.otf") format("opentype");
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --bg-color: #07111f;
            --bg-color-2: #0a1a2f;
            --panel-color: rgba(8, 19, 36, 0.82);
            --text-color: #f4f8ff;
            --muted-text: #c3d4eb;
            --accent-color: #9cd2ff;
            --accent-strong: #e8f4ff;
            --highlight-color: rgba(156, 210, 255, 0.28);
            --timeline-line: rgba(202, 228, 255, 0.34);
            --timeline-glow: 0 0 14px rgba(156, 210, 255, 0.34);
            --shadow-soft: 0 10px 40px rgba(0, 0, 0, 0.28);
            --shadow-panel: 0 20px 60px rgba(0, 0, 0, 0.35);
            --icon-size: 40px;
            --modal-bg: rgba(0, 0, 0, 0.5);
            --transition: 0.25s ease;
            --entry-width-min: 140px;
            --entry-width-max: 260px;
        }

        body.fake-mode {
            --bg-color: #14080e;
            --bg-color-2: #240a15;
            --panel-color: rgba(40, 9, 22, 0.82);
            --panel-border: rgba(255, 193, 216, 0.38);
            --text-color: #fff4f8;
            --muted-text: #f0cfdb;
            --accent-color: #ff9ec2;
            --accent-strong: #ffe4ee;
            --highlight-color: rgba(255, 158, 194, 0.28);
            --timeline-line: rgba(255, 214, 229, 0.36);
            --timeline-glow: 0 0 14px rgba(255, 158, 194, 0.34);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        body {
            overflow: hidden;
            margin: 0;
            padding: 0;
            opacity: 0;
            color: var(--text-color);
            font-family: "gojiromanus", serif;
            background:
                radial-gradient(circle at 20% 20%, rgba(173, 216, 255, 0.12), transparent 20%),
                radial-gradient(circle at 80% 10%, rgba(120, 170, 255, 0.08), transparent 18%),
                radial-gradient(circle at 70% 75%, rgba(180, 220, 255, 0.06), transparent 22%),
                linear-gradient(160deg, var(--bg-color), var(--bg-color-2));
            transition:
                opacity var(--transition),
                color var(--transition),
                background var(--transition);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                radial-gradient(circle, rgba(255, 255, 255, 0.45) 1px, transparent 1px),
                radial-gradient(circle, rgba(255, 255, 255, 0.22) 1px, transparent 1px);
            background-size: 120px 120px, 180px 180px;
            background-position: 0 0, 40px 70px;
            opacity: 0.18;
            mix-blend-mode: screen;
        }

        .page-title {
            font-family: 'gojiromanus', serif;
            position: fixed;
            top: 18px;
            width:12em;
            right: 20px;
            z-index: 20;
            user-select: none;
            cursor: pointer;
            outline: none;
            border: none;
            padding: 10px 14px;
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.01));
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow-soft);

            color: var(--accent-strong);
            font-size: 20px;
            letter-spacing: 0.08em;
            text-decoration: none;
            transition:
                transform 0.15s ease,
                background var(--transition),
                color var(--transition),
                border-color var(--transition);
        }

        .page-title:focus-visible {
            outline: 2px solid color-mix(in srgb, var(--accent-color) 72%, white 28%);
            outline-offset: 3px;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.16),
                0 0 24px color-mix(in srgb, var(--accent-color) 58%, white 42%),
                var(--shadow-soft);
        }


        .diary-container-wrapper {
            width: 100%;
            max-width: 96%;
            height: 78vh;
            padding: 10px 0 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .diary-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: row;
            gap: 28px;
            padding: 10px 32px 12px;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
            position: relative;
            scroll-behavior: auto;
            align-items: stretch;
        }


        .diary-container::-webkit-scrollbar {
            display: none;
        }

        .diary-entry {
            writing-mode: vertical-rl;
            text-orientation: upright;
            white-space: normal;

            flex: 0 0 auto;
            height: 100%;
            padding: 18px 12px;
            border-radius: 20px;

            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02)),
                var(--panel-color);
            box-shadow: var(--shadow-panel);

            overflow: hidden;
            contain: layout paint style;
            isolation: isolate;

            transition:
                opacity 0.3s ease,
                transform 0.3s ease,
                border-color 0.25s ease,
                background 0.25s ease;
            position: relative;
        }

        .diary-entry::before {
            content: "";
            position: absolute;
            inset: 8px;
            border-radius: 14px;
            pointer-events: none;
        }

        .diary-entry:not(.active) {
            opacity: 0.58;
            transform: scale(0.985);
        }

        .diary-entry.active {
            opacity: 1;
            border-color: var(--panel-border);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.04),
                0 0 30px rgba(142, 197, 255, 0.14),
                var(--shadow-panel);
        }

        .date-container {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 8px;
            margin: 0 0 18px;
            max-inline-size: 100%;
            overflow: hidden;
            position: relative;
            z-index: 2;
        }

        .date {
            position: relative;
            cursor: pointer;
            font-size: 1.5em;
            line-height: 1.55;
            white-space: nowrap;
            color: var(--accent-strong);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.08);
        }

        .date:focus-visible {
            outline: 2px solid color-mix(in srgb, var(--accent-color) 72%, white 28%);
            outline-offset: 2px;
            border-radius: 6px;
            text-shadow: 0 0 14px rgba(255, 255, 255, 0.16);
        }

        .days-ago {
            font-size: 1.08em;
            white-space: nowrap;
            opacity: 0.7;
            color: var(--muted-text);
            cursor: default;
            writing-mode: vertical-rl;
        }

        .content {
            position: relative;
            z-index: 1;
            font-size: 1.24em;
            line-height: 2.05;
            letter-spacing: 0.1em;
            white-space: pre-line;
            overflow-wrap: anywhere;
            word-break: break-word;
            max-inline-size: 100%;
            overflow: hidden;
            color: var(--text-color);
            text-shadow: 0.2px 0 0.8px rgba(255, 255, 255, 0.25);
        }


        .content.toggle-font {
            font-family: "gojiromanus", serif !important;
        }

        .highlight {
            background: linear-gradient(180deg, transparent 10%, var(--highlight-color) 10%, var(--highlight-color) 90%, transparent 90%);
            font-weight: bold;
            padding: 0 2px;
            border-radius: 2px;
            margin: 0 -2px;
        }

        .timeline-container {
            position: fixed;
            left: 0;
            right: 0;
            bottom: calc(8px + env(safe-area-inset-bottom, 0px));
            height: 62px;
            padding: 0 8%;
            z-index: 15;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }

        .timeline-shell {
            width: 100%;
            height: 100%;
            padding: 10px 14px 8px;
            border-radius: 999px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01)),
                rgba(7, 17, 31, 0.45);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow-soft);
        }

        .timeline {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: row-reverse;
            justify-content: center;
            align-items: flex-end;
            gap: 2px;
            cursor: pointer;
        }

        .timeline::before {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            bottom: 4px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--timeline-line), transparent);
            pointer-events: none;
        }

        .timeline-bar {
            position: relative;
            width: 7px;
            height: 100%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            background: transparent;
            transform-origin: bottom center;
            transition: transform 0.18s ease;
        }

        .timeline-bar-inner {
            width: 100%;
            min-height: 6px;
            height: 100%;
            border-radius: 999px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.06)),
                var(--bar-color, rgba(180, 210, 255, 0.72));
            opacity: 0.68;
            transition:
                opacity var(--transition),
                height 0.2s ease,
                box-shadow var(--transition);
            box-shadow: var(--timeline-glow);
            position: relative;
        }

        .timeline-bar:hover .timeline-bar-inner,
        .timeline-bar.selected .timeline-bar-inner {
            opacity: 1;
            box-shadow:
                0 0 18px color-mix(in srgb, var(--bar-color, #8ec5ff) 65%, white 35%),
                0 0 6px rgba(255, 255, 255, 0.15);
        }

        .timeline-bar:hover,
        .timeline-bar.selected {
            transform: scaleY(1.12);
        }

        .timeline.search-active .timeline-bar .timeline-bar-inner {
            opacity: 0.15 !important;
        }

        .timeline.search-active .timeline-bar.search-hit .timeline-bar-inner {
            opacity: 1 !important;
            box-shadow:
                0 0 22px color-mix(in srgb, var(--bar-color, #8ec5ff) 72%, white 28%),
                0 0 10px rgba(255, 255, 255, 0.22);
        }

        .timeline.search-active .timeline-bar {
            transform: scaleY(0.94);
        }

        .timeline.search-active .timeline-bar.search-hit {
            transform: scaleY(1.2);
        }

        .steps-bar {
            position: absolute;
            left: 1px;
            right: 1px;
            height: 3px;
            border-radius: 999px;
            background:
                linear-gradient(90deg, rgba(255, 226, 137, 0.6), rgba(255, 196, 84, 0.95), rgba(255, 226, 137, 0.6));
            box-shadow: 0 0 10px rgba(255, 208, 92, 0.38);
            pointer-events: none;
            z-index: 10;
        }

        .icon {
            flex: 0 0 auto;
        }

        .icon:hover {
            z-index: 20;
            transform: scale(1.08);
            box-shadow: 0 0 18px rgba(255, 255, 255, 0.08);
        }

        .icon.highlight {
            background-color: var(--highlight-color);
            filter: brightness(0.92);
        }

        .icon img,
        .icon-emoji {
            max-width: 100%;
            max-height: 100%;
            border-radius: 8px;
            font-size: 2em;
            filter: grayscale(100%) brightness(1.1);
            opacity: 0.46;
        }

        .icon:hover img,
        .icon:hover .icon-emoji {
            filter: grayscale(0%) brightness(1);
            opacity: 1;
        }

        .tooltip {
            position: absolute;
            top: -42%;
            left: 92%;
            transform: translateX(-50%);
            padding: 6px 10px;
            border-radius: 10px;
            background: rgba(10, 20, 36, 0.88);
            color: var(--accent-strong);
            font-size: 14px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition);
            z-index: 30;
            box-shadow: var(--shadow-soft);
        }

        .icon:hover .tooltip {
            opacity: 1;
        }

        .date .tooltip {
            position: absolute;
            writing-mode: vertical-lr;
            left: 4px;
            top: 1px;
            font-size: 12px;
            padding: 8px 5px;
            color: var(--accent-strong);
            background: rgba(7, 17, 31, 0.85);
            opacity: 0;
        }

        .date:hover .tooltip {
            opacity: 1;
        }

        .falling {
            will-change: transform, opacity;
            backface-visibility: hidden;
            perspective: 1000px;
        }

        .char.falling {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            will-change: transform, opacity, filter;
            backface-visibility: hidden;
            transform-origin: center center;
        }

        @keyframes shimmer {
            0% {
                opacity: 0.75;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.75;
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60%,
            80% {
                transform: translateX(-2px);
            }

            40% {
                transform: translateX(2px);
            }
        }

        .date:hover {
            animation: shake 0.3s infinite;
            animation-duration: calc(0.3s - 0.02s * var(--wind-level));
        }

        .timeline-bar:hover .timeline-bar-inner,
        .timeline-bar.selected .timeline-bar-inner {
            animation: shake-vertical calc(0.12s + 0.2s / var(--wind-level)) infinite;
        }

        @keyframes shake-vertical {

            0%,
            100% {
                transform: translateY(0);
            }

            25% {
                transform: translateY(-2px);
            }

            75% {
                transform: translateY(2px);
            }
        }

        @media (max-width: 768px) {
            .page-title {
                top: 12px;
                right: 12px;
                font-size: 16px;
                padding: 8px 12px;
            }

            .diary-container-wrapper {
                max-width: 100%;
                height: 74vh;
            }

            .diary-container {
                padding: 6px 12px 10px;
                gap: 14px;
            }

            .diary-entry {
                min-width: 118px;
                border-radius: 16px;
            }

            .content {
                font-size: 1.08em;
                line-height: 1.95;
            }

            .timeline-container {
                height: 56px;
                padding: 0 4%;
            }

            .timeline-shell {
                padding: 8px 10px 7px;
            }

            .timeline-bar {
                width: 6px;
            }

            .steps-bar {
                height: 4px;
                left: 0;
                right: 0;
                box-shadow: 0 0 12px rgba(255, 208, 92, 0.5);
            }

            .tooltip {
                font-size: 12px;
            }
        }

        .nav-button {
            position: fixed;
            bottom: 3vh;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            border-radius: 50%;
            user-select: none;
            z-index: 1000;
            opacity: 0;
            transition:
                opacity 0.25s ease,
                transform 0.18s ease,
                box-shadow 0.25s ease,
                background-color 0.25s ease;
            backdrop-filter: blur(10px);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
        }

        .nav-button:hover {
            opacity: 0.84;
            transform: scale(1.05);
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.28);
        }

        .nav-button:active {
            transform: scale(0.98);
        }

        .nav-button:focus-visible {
            opacity: 0.92;
            outline: 2px solid color-mix(in srgb, var(--accent-color) 68%, white 32%);
            outline-offset: 3px;
        }

        .nav-left {
            left: 3vw;
        }

        .nav-right {
            right: 3vw;
        }

        /* 検索ハイライト用のスタイル */
        .search-highlight {
            background:
                linear-gradient(180deg, rgba(255, 242, 133, 0.95), rgba(255, 208, 90, 0.95));
            color: #1b0d00;
            border-radius: 4px;
            padding: 0 3px;
            font-weight: 800;
            text-shadow: none;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.45) inset,
                0 0 10px rgba(255, 214, 102, 0.65);
        }

        /* 検索中の入力フィールドスタイル */
        .page-title[placeholder="検索中... (Escapeで戻る)"] {
            background: rgba(142, 197, 255, 0.2) !important;
        }

        input {
            outline: none;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
                scroll-behavior: auto !important;
            }

            .date:hover,
            .timeline-bar:hover .timeline-bar-inner,
            .timeline-bar.selected .timeline-bar-inner {
                animation: none !important;
            }
        }
    </style>
</head>

<body>
    <input type="text" id="pageTitleInput" class="page-title" autocomplete="off" placeholder="誤字ロマの日記">
    <div class="nav-button nav-left" id="navLeft" role="button" tabindex="0" aria-label="前の日記へ移動">＜</div>
    <div class="nav-button nav-right" id="navRight" role="button" tabindex="0" aria-label="次の日記へ移動">＞</div>

    <div class="diary-container-wrapper">
        <div class="diary-container" id="diaryContainer"></div>
    </div>

    <div class="timeline-container">
        <div class="timeline-shell">
            <div class="timeline" id="timeline"></div>
        </div>
    </div>

    <script>
        class DiaryUtils {
            static toKanjiNumber(num) {
                const kanjiNumbers = ["〇", "一", "二", "三", "四", "五", "六", "七", "八", "九"];
                return num.toString().split("").map(digit => kanjiNumbers[digit]).join("");
            }

            static toKanjiMonth(month) {
                const kanjiMonths = [
                    "一月", "二月", "三月", "四月", "五月", "六月",
                    "七月", "八月", "九月", "十月", "十一月", "十二月"
                ];
                return kanjiMonths[month - 1];
            }

            static toKanjiDay(day) {
                const days = [
                    "", "一", "二", "三", "四", "五", "六", "七", "八", "九", "十",
                    "十一", "十二", "十三", "十四", "十五", "十六", "十七", "十八", "十九",
                    "二十", "二十一", "二十二", "二十三", "二十四", "二十五",
                    "二十六", "二十七", "二十八", "二十九", "三十", "三十一"
                ];
                return days[day];
            }

            static toJapaneseEra(year) {
                const eras = [
                    { name: "令和", start: 2019, offset: 2018 },
                    { name: "平成", start: 1989, offset: 1988 },
                    { name: "昭和", start: 1926, offset: 1925 },
                    { name: "大正", start: 1912, offset: 1911 },
                    { name: "明治", start: 1868, offset: 1867 }
                ];
                const era = eras.find(e => year >= e.start);
                const eraYear = year - era.offset;
                return `${era.name}${this.toKanjiNumber(eraYear)}年`;
            }

            static formatJapaneseDate(yyyymmdd) {
                const year = parseInt(yyyymmdd.substring(0, 4), 10);
                const month = parseInt(yyyymmdd.substring(4, 6), 10);
                const day = parseInt(yyyymmdd.substring(6, 8), 10);
                const date = new Date(year, month - 1, day);
                const dayOfWeek = ["日", "月", "火", "水", "木", "金", "土"][date.getDay()] + "曜";

                return {
                    short: `${this.toKanjiMonth(month)}${this.toKanjiDay(day)}日 ${dayOfWeek}`,
                    long: `${this.toJapaneseEra(year)}${this.toKanjiMonth(month)}${this.toKanjiDay(day)}日（${dayOfWeek}）`
                };

            }

            static calculateDaysAgo(yyyymmdd) {
                const entryDate = new Date(
                    parseInt(yyyymmdd.substring(0, 4), 10),
                    parseInt(yyyymmdd.substring(4, 6), 10) - 1,
                    parseInt(yyyymmdd.substring(6, 8), 10)
                );
                const today = new Date();
                const diffTime = today - entryDate;
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                return diffDays === 0 ? "　今日" : `　${diffDays}日前`;
            }

            static escapeRegExp(string) {
                return string.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            }

            static clamp(value, min, max) {
                return Math.min(max, Math.max(min, value));
            }

            static normalize(value, min, max) {
                if (max === min) return 0;
                return (value - min) / (max - min);
            }

            static hslString(h, s, l) {
                return `hsl(${h} ${s}% ${l}%)`;
            }
        }

        class DiaryApp {
            static isFakeMode = false;
            static fakeEntriesCache = null;
            static diaryEntries = [];
            static iconsData = [];
            static audioContext = null;
            static currentOscillator = null;
            static stepsData = [];
            static weatherData = [];
            static lastKeyTime = 0;
            static wheelTimeout = null;
            static searchDebounceTimer = null;
            static lastSpaceTime = 0;
            static isSearchMode = false; // Class property
            static hasSearchResults = false;
            static searchQuery = "";
            static originalPlaceholder = "誤字ロマの日記";

            static async init() {
                await this.loadWeatherAndStepsData();
                await this.loadDiaryEntries();
                this.preloadFakeEntries();
                this.setupEventListeners();
                this.updateThemeColor();
                document.body.style.opacity = 1;
                this.setupNavButtons();
                this.setupPageTitleInput();
                this.updatePageTitle(this.diaryEntries.length);
            }

            static setupPageTitleInput() {
                const pageTitleInput = document.getElementById('pageTitleInput');
                if (!pageTitleInput) return;

                pageTitleInput.placeholder = this.originalPlaceholder;

                pageTitleInput.addEventListener('mouseenter', () => {
                    pageTitleInput.focus();
                });

                pageTitleInput.addEventListener('click', () => {
                    const hasInputValue = pageTitleInput.value.trim().length > 0;
                    if (hasInputValue) {
                        pageTitleInput.value = '';
                        this.clearSearch();
                        return;
                    }

                    if (!this.isSearchMode) {
                        this.toggleFakeMode();
                        this.updatePageTitle(this.diaryEntries.length);
                    }
                });

                pageTitleInput.addEventListener('keydown', async (e) => {
                    if (e.key === 'Enter') {
                        const query = pageTitleInput.value.trim();
                        if (query) {
                            await this.handleSearch(query);
                        }
                    } else if (e.key === 'Escape') {
                        this.clearSearch();
                    }
                });

                pageTitleInput.addEventListener('input', () => {
                    if (this.searchDebounceTimer) {
                        clearTimeout(this.searchDebounceTimer);
                    }

                    const query = pageTitleInput.value.trim();
                    this.searchDebounceTimer = setTimeout(async () => {
                        if (query.length > 0) {
                            await this.handleSearch(query, true);
                            return;
                        }
                        this.clearSearch();
                    }, 350);
                });
            }
            static clearSearch() {
                if (this.searchDebounceTimer) {
                    clearTimeout(this.searchDebounceTimer);
                    this.searchDebounceTimer = null;
                }

                this.isSearchMode = false;
                this.hasSearchResults = false;
                this.searchQuery = "";
                const pageTitleInput = document.getElementById('pageTitleInput');
                if (pageTitleInput) {
                    pageTitleInput.value = '';
                    pageTitleInput.placeholder = this.originalPlaceholder;
                }

                // Show all entries again
                document.querySelectorAll('.diary-entry').forEach(entry => {
                    entry.style.display = '';
                    const content = entry.querySelector('.content');
                    if (content) {
                        const entryData = this.diaryEntries.find(e => e.yyyymmdd === entry.id);
                        if (entryData) {
                            content.textContent = entryData.content;
                        }
                    }
                });

                this.updateTimelineSearchState(new Set());
                this.updatePageTitle(this.diaryEntries.length);
            }

            static async handleSearch(query, keepInputFocus = false) {
                this.isSearchMode = true;
                this.searchQuery = query;
                const pageTitleInput = document.getElementById('pageTitleInput');
                const shouldRestoreFocus = keepInputFocus || document.activeElement === pageTitleInput;
                if (pageTitleInput) {
                    pageTitleInput.placeholder = "検索中... (Escapeで戻る)";
                }

                let matchedDateHash = null;
                if (/^\d{6}$/.test(query)) {
                    matchedDateHash = '20' + query;
                } else if (/^\d{8}$/.test(query)) {
                    matchedDateHash = query;
                }

                const entries = document.querySelectorAll('.diary-entry');
                let foundMatch = false;
                let firstVisibleEntry = null;
                const matchedEntryIds = new Set();

                entries.forEach((entryElement) => {
                    const yyyymmdd = entryElement.id;
                    const entryData = this.diaryEntries.find(entry => entry.yyyymmdd === yyyymmdd);
                    if (!entryData) {
                        entryElement.style.display = 'none';
                        return;
                    }

                    const contentElement = entryElement.querySelector('.content');

                    if (matchedDateHash && yyyymmdd === matchedDateHash) {
                        entryElement.style.display = '';
                        contentElement.textContent = entryData.content;
                        foundMatch = true;
                        matchedEntryIds.add(yyyymmdd);
                        entryElement.classList.add('active');
                        if (!firstVisibleEntry) firstVisibleEntry = entryElement;
                    } else {
                        const textMatchIndex = entryData.content.toLowerCase().indexOf(query.toLowerCase());
                        if (textMatchIndex !== -1) {
                            entryElement.style.display = '';
                            const escapedQuery = DiaryUtils.escapeRegExp(query);
                            const regex = new RegExp(`(${escapedQuery})`, 'gi');
                            contentElement.innerHTML = entryData.content.replace(regex, '<span class="search-highlight">$1</span>');
                            foundMatch = true;
                            matchedEntryIds.add(yyyymmdd);
                            entryElement.classList.add('active');
                            if (!firstVisibleEntry) firstVisibleEntry = entryElement;
                        } else {
                            entryElement.style.display = 'none';
                        }
                    }
                });

                this.hasSearchResults = foundMatch;
                this.updateTimelineSearchState(matchedEntryIds);

                if (foundMatch && firstVisibleEntry) {
                    window.location.hash = firstVisibleEntry.id;
                    this.scrollToEntryFromHash();
                    if (shouldRestoreFocus && pageTitleInput) {
                        requestAnimationFrame(() => {
                            pageTitleInput.focus();
                            const cursorPos = pageTitleInput.value.length;
                            pageTitleInput.setSelectionRange(cursorPos, cursorPos);
                        });
                    }
                } else {
                    const pageTitleInput = document.getElementById('pageTitleInput');
                    if (pageTitleInput) {
                        pageTitleInput.placeholder = "一致する結果がありません";
                        if (shouldRestoreFocus) {
                            requestAnimationFrame(() => {
                                pageTitleInput.focus();
                                const cursorPos = pageTitleInput.value.length;
                                pageTitleInput.setSelectionRange(cursorPos, cursorPos);
                            });
                        }
                        setTimeout(() => {
                            if (pageTitleInput.placeholder === "一致する結果がありません") {
                                this.clearSearch();
                            }
                        }, 2000);
                    }
                }
            }

            static updateThemeColor() {
                const metaThemeColor = document.querySelector('meta[name="theme-color"]');
                if (!metaThemeColor) return;
                metaThemeColor.setAttribute("content", getComputedStyle(document.documentElement).getPropertyValue('--bg-color').trim());
            }

            static parseCSV(csv) {
                const lines = csv.split("\n").filter(line => line.trim());
                return lines.slice(1).map(line => {
                    const [date, title, icon, url] = line.split(",").map(v => v.trim());
                    return { date, title, icon, url };
                });
            }

            static getIconsForDate(dateForIcons, keyword = "") {
                const icons = this.iconsData.filter(icon => icon.date === dateForIcons);
                if (icons.length === 0) return "";

                return icons.map(icon => {
                    const isUrl = icon.icon && (icon.icon.startsWith("http://") || icon.icon.startsWith("https://"));
                    const iconContent = isUrl
                        ? `<img src="${icon.icon}" alt="${icon.title}" class="icon-img" loading="lazy">`
                        : `<span class="icon-emoji">${icon.icon}</span>`;
                    const tooltip = icon.title ? `<div class="tooltip">${icon.title}</div>` : "";
                    const urlAttr = icon.url ? `onclick="window.open('${icon.url}', '_blank')" style="cursor: pointer;"` : "";
                    const highlightClass = keyword && icon.title.toLowerCase().includes(keyword.toLowerCase()) ? "highlight" : "";
                    return `<div class="icon ${highlightClass}" ${urlAttr}>${iconContent}${tooltip}</div>`;
                }).join("");
            }
            static setupNavButtons() {
                const navLeft = document.getElementById("navLeft");
                const navRight = document.getElementById("navRight");

                if (navLeft && navRight) {
                    const setupHoldNavigation = (button, direction) => {
                        const initialDelayMs = 300;
                        const repeatIntervalMs = 16;
                        let repeatDelayTimer = null;
                        let repeatIntervalTimer = null;

                        const clearRepeat = () => {
                            if (repeatDelayTimer) {
                                clearTimeout(repeatDelayTimer);
                                repeatDelayTimer = null;
                            }
                            if (repeatIntervalTimer) {
                                clearInterval(repeatIntervalTimer);
                                repeatIntervalTimer = null;
                            }
                            document.removeEventListener("pointerup", clearRepeat);
                            document.removeEventListener("pointercancel", clearRepeat);
                        };

                        button.addEventListener("pointerdown", (e) => {
                            if (!e.isPrimary) return;
                            if (e.pointerType === "mouse" && e.button !== 0) return;
                            e.preventDefault();

                            clearRepeat();
                            this.navigateByDirection(direction);

                            repeatDelayTimer = setTimeout(() => {
                                repeatIntervalTimer = setInterval(() => {
                                    this.navigateByDirection(direction, true);
                                }, repeatIntervalMs);
                            }, initialDelayMs);

                            document.addEventListener("pointerup", clearRepeat);
                            document.addEventListener("pointercancel", clearRepeat);
                        });

                        button.addEventListener("pointerleave", clearRepeat);
                        button.addEventListener("keydown", (e) => {
                            if (e.key === "Enter" || e.key === " ") {
                                e.preventDefault();
                                this.navigateByDirection(direction);
                            }
                        });
                    };

                    setupHoldNavigation(navLeft, -1);
                    setupHoldNavigation(navRight, 1);
                }
            }
            static handleWheelNavigation(e) {
                const currentEntry = this.getCurrentEntry();
                if (!currentEntry) return;

                const direction = e.deltaY > 0 ? 1 : -1;
                const nextEntry = this.getAdjacentEntry(currentEntry, direction);
                if (nextEntry) {
                    window.location.hash = nextEntry.id;
                    this.scrollToEntryFromHash();
                }
            }
            static navigateByDirection(direction, useKeyboardRepeatGate = false) {
                const currentEntry = this.getCurrentEntry();
                if (!currentEntry) return;

                if (useKeyboardRepeatGate) {
                    const content = currentEntry.querySelector(".content");
                    const charCount = content?.textContent?.length ?? 0;

                    const baseThreshold = 82;
                    const maxThreshold = 370;
                    const threshold = Math.min(baseThreshold + (charCount * 0.5), maxThreshold);
                    if (this.lastKeyTime && Date.now() - this.lastKeyTime < threshold) return;
                    this.lastKeyTime = Date.now();
                }

                const nextEntry = this.getAdjacentEntry(currentEntry, direction);
                if (nextEntry) {
                    window.location.hash = nextEntry.id;
                    this.scrollToEntryFromHash();
                }
            }
            static setupEventListeners() {
                const pageTitle = document.getElementById("pageTitle");
                if (pageTitle) {
                    pageTitle.addEventListener("click", () => this.toggleFakeMode());
                }

                document.addEventListener("keydown", e => this.handleKeyDown(e));
                window.addEventListener("hashchange", () => this.scrollToEntryFromHash());
                window.addEventListener("load", () => this.scrollToEntryFromHash());

                const container = document.getElementById("diaryContainer");
                if (container) {
                    container.addEventListener("wheel", (e) => {
                        e.preventDefault();
                        this.handleWheelNavigation(e);
                    }, { passive: false });
                }
            }

            static toggleFakeMode() {
                this.isFakeMode = !this.isFakeMode;
                document.body.classList.toggle("fake-mode", this.isFakeMode);
                this.updateThemeColor();
                this.renderTimeline(); // タイムラインも更新

                if (this.isFakeMode) {
                    if (this.fakeEntriesCache) {
                        this.renderEntries(this.fakeEntriesCache);
                    } else {
                        this.loadDiaryEntries("fake.md");
                    }
                } else {
                    this.loadDiaryEntries("entry.md");
                }
                this.updatePageTitle(this.diaryEntries.length);
            }
            static async loadDiaryEntries(filename = "entry.md") {
                try {
                    const response = await fetch(filename);
                    if (!response.ok) {
                        throw new Error(`Failed to load ${filename}: ${response.status}`);
                    }
                    const text = await response.text();
                    this.renderEntries(text);
                } catch (error) {
                    console.error(`Error loading ${filename}:`, error);
                }
            }

            static renderEntries(text) {
                const container = document.getElementById("diaryContainer");
                if (!container) {
                    console.error("コンテナが見つかりません。");
                    return;
                }

                container.innerHTML = "";
                this.diaryEntries = [];

                const entries = text.split("---").filter(entry => entry.trim());
                entries.reverse().forEach(entry => {
                    const dateMatch = entry.match(/date:\s*(.*)/);
                    const contentMatch = entry.match(/content:\s*\|\s*\n([\s\S]*?)(?=\n---|\n$|$)/m);
                    if (!dateMatch || !contentMatch) return;

                    const yyyymmdd = dateMatch[1].trim();
                    const dateObj = DiaryUtils.formatJapaneseDate(yyyymmdd);
                    const contentLines = contentMatch[1]
                        .split("\n")
                        .map(line => line.replace(/^\s*\|?\s*/, ""))
                        .join("\n");

                    const dateForIcons = `${yyyymmdd.substring(0, 4)}/${yyyymmdd.substring(4, 6)}/${yyyymmdd.substring(6, 8)}`;

                    const entryElement = document.createElement("div");
                    entryElement.className = "diary-entry";
                    entryElement.id = yyyymmdd;

                    entryElement.innerHTML = `
                        <div class="date-container">
                            <div class="date" data-yyyymmdd="${yyyymmdd}" tabindex="0" role="button" aria-label="${dateObj.short}の日記へ移動">${dateObj.short}</div>
                            <div class="days-ago">${DiaryUtils.calculateDaysAgo(yyyymmdd)}</div>
                            ${this.getIconsForDate(dateForIcons)}
                        </div>
                        <div class="content">${contentLines}</div>
                    `;

                    container.appendChild(entryElement);

                    this.diaryEntries.push({
                        yyyymmdd,
                        content: contentLines.trim(),
                        icons: []
                    });
                });

                this.setupDateClick();
                this.renderTimeline();
                this.updatePageTitle(entries.length);
                this.setupContentClick();
                this.scrollToEntryFromHash();
            }

            static setupContentClick() {
                document.querySelectorAll(".content").forEach(content => {
                    let speechSynthesisUtterance = null;
                    let isCopied = false;
                    let isFontToggled = false;

                    content.addEventListener("click", async (e) => {
                        e.stopPropagation();

                        if (speechSynthesisUtterance) {
                            window.speechSynthesis.cancel();
                            speechSynthesisUtterance = null;
                            isCopied = false;
                            return;
                        }

                        if (!isCopied) {
                            try {
                                const text = content.textContent;
                                await navigator.clipboard.writeText(text);
                                isCopied = true;
                                setTimeout(() => { isCopied = false; }, 2000);

                                isFontToggled = !isFontToggled;
                                content.classList.toggle("toggle-font", isFontToggled);
                            } catch (error) {
                                console.error("Clipboard copy failed:", error);
                            }
                        }
                    });

                    content.addEventListener("dblclick", (e) => {
                        e.stopPropagation();

                        if (speechSynthesisUtterance) {
                            window.speechSynthesis.cancel();
                            speechSynthesisUtterance = null;
                            return;
                        }

                        const text = content.textContent;
                        speechSynthesisUtterance = new SpeechSynthesisUtterance(text);
                        speechSynthesisUtterance.lang = "ja-JP";
                        speechSynthesisUtterance.onend = () => {
                            speechSynthesisUtterance = null;
                        };
                        window.speechSynthesis.speak(speechSynthesisUtterance);
                    });
                });
            }

            static setupDateClick() {
                document.querySelectorAll(".date").forEach(dateElement => {
                    dateElement.addEventListener("click", () => {
                        window.location.hash = dateElement.getAttribute("data-yyyymmdd");
                    });
                    dateElement.addEventListener("keydown", (e) => {
                        if (e.key === "Enter" || e.key === " ") {
                            e.preventDefault();
                            window.location.hash = dateElement.getAttribute("data-yyyymmdd");
                        }
                    });
                });
            }

            static renderTimeline() {
                const timeline = document.getElementById("timeline");
                timeline.innerHTML = "";

                if (this.diaryEntries.length === 0) return;

                const sortedEntries = [...this.diaryEntries].sort((a, b) => a.yyyymmdd.localeCompare(b.yyyymmdd));
                const contentLengths = sortedEntries.map(entry => entry.content.length);
                const maxContentLength = Math.min(this.percentile95(contentLengths), 500);
                const baseHeight = 6;
                const heightRatio = 44 / Math.max(maxContentLength, 1);
                const maxSteps = 25000;

                sortedEntries.forEach(entry => {
                    const yyyymmdd = entry.yyyymmdd;
                    const dateForWeather = `${yyyymmdd.substring(0, 4)}/${yyyymmdd.substring(4, 6)}/${yyyymmdd.substring(6, 8)}`;
                    const dateForSteps = `${yyyymmdd.substring(0, 4)}-${yyyymmdd.substring(4, 6)}-${yyyymmdd.substring(6, 8)}`;

                    const weather = this.weatherData.find(w => w.date === dateForWeather);
                    const stepsEntry = this.stepsData.find(s => s.date === dateForSteps);

                    const container = document.createElement("div");
                    container.className = "timeline-bar";
                    container.dataset.yyyymmdd = yyyymmdd;

                    const stepsBar = document.createElement("div");
                    stepsBar.className = "steps-bar";

                    const stepsRatio = stepsEntry ? Math.min(1, stepsEntry.steps / maxSteps) : 0;
                    const stepsBottomPercent = Math.min(96, Math.max(4, stepsRatio * 100));
                    stepsBar.style.bottom = `${stepsBottomPercent}%`;
                    if (stepsEntry && stepsEntry.steps >= 10000) {
                        stepsBar.style.background = "linear-gradient(90deg, rgba(148, 244, 182, 0.7), rgba(68, 214, 148, 0.98), rgba(148, 244, 182, 0.7))";
                        stepsBar.style.boxShadow = "0 0 12px rgba(68, 214, 148, 0.55)";
                    }


                    container.title =
                        `${entry.yyyymmdd}: ${entry.content.length}文字  ` +
                        `${stepsEntry ? stepsEntry.steps + "歩" : "歩数データなし"}  ` +
                        `${weather ? `${weather.avgTemp}°C, ${weather.avgWind}m/s` : "天気データなし"}`;

                    if (weather) {
                        const temp = weather.avgTemp;
                        const wind = weather.avgWind;

                        const hue = this.temperatureToHue(temp);
                        const sat = this.isFakeMode ? 78 : 72;
                        const light = this.isFakeMode ? 66 : 62;
                        const barColor = `hsl(${hue} ${sat}% ${light}%)`;

                        container.style.setProperty("--bar-color", barColor);

                        const windLevel = DiaryUtils.clamp(Math.floor(wind * 10 / 8), 1, 10);
                        container.style.setProperty("--wind-level", windLevel);
                    } else {
                        container.style.setProperty("--bar-color", this.isFakeMode ? "#ff8ab3" : "#8ec5ff");
                        container.style.setProperty("--wind-level", 1);
                    }
                    // 風速に応じたopacity
                    const windOpacity = weather ? DiaryUtils.clamp(0.3 + (weather.avgWind * 0.1), 0.3, 0.8) : 0.5;
                    const innerBar = document.createElement("div");
                    innerBar.style.opacity = windOpacity; // opacityを設定

                    innerBar.className = "timeline-bar-inner";
                    const contentLength = Math.min(entry.content.length, maxContentLength);
                    innerBar.style.height = `${Math.max(baseHeight, contentLength * heightRatio)}px`;

                    container.addEventListener("mouseover", () => {
                        window.location.hash = entry.yyyymmdd;
                        this.scrollToEntryFromHash();
                    });

                    container.addEventListener("touchstart", (e) => {
                        e.preventDefault();
                        window.location.hash = entry.yyyymmdd;
                        this.scrollToEntryFromHash();
                    }, { passive: false });

                    container.appendChild(innerBar);
                    container.appendChild(stepsBar);
                    timeline.appendChild(container);
                });

                const hash = window.location.hash.substring(1);
                if (hash && /^\d{8}$/.test(hash)) {
                    const selectedBar = document.querySelector(`.timeline-bar[data-yyyymmdd="${hash}"]`);
                    if (selectedBar) selectedBar.classList.add("selected");
                }

                this.updateTimelineSearchState();

                let lastHash = window.location.hash;
                timeline.addEventListener("touchmove", (e) => {
                    e.preventDefault();

                    const touch = e.touches[0];
                    const rect = timeline.getBoundingClientRect();
                    const x = touch.clientX - rect.left;
                    const percent = x / rect.width;
                    const index = Math.floor((1 - percent) * sortedEntries.length);

                    if (index >= 0 && index < sortedEntries.length) {
                        const newHash = sortedEntries[index].yyyymmdd;
                        if (lastHash !== `#${newHash}`) {
                            window.location.hash = newHash;
                            lastHash = `#${newHash}`;
                            this.scrollToEntryFromHash();
                        }
                    }
                }, { passive: false });
            }

            static temperatureToHue(temp) {
                const clampedTemp = DiaryUtils.clamp(temp, -5, 35);
                const ratio = DiaryUtils.normalize(clampedTemp, -5, 35);

                if (this.isFakeMode) {
                    return Math.round(320 - ratio * 70);
                }
                return Math.round(220 - ratio * 170);
            }

            static percentile95(arr) {
                const sorted = [...arr].sort((a, b) => a - b);
                return sorted[Math.floor(sorted.length * 0.95)] || 1;
            }


            static async preloadFakeEntries() {
                try {
                    const response = await fetch("fake.md");
                    if (response.ok) {
                        this.fakeEntriesCache = await response.text();
                    }
                } catch (error) {
                    console.error("Error preloading fake entries:", error);
                }
            }

            static triggerHapticFeedback(charCount) {
                const minVibrate = 8;
                const maxVibrate = 160;
                const duration = Math.max(minVibrate, Math.min(maxVibrate, minVibrate + charCount));

                if ("vibrate" in navigator) {
                    navigator.vibrate(duration);
                }
            }

            static scrollToEntryFromHash() {
                const hash = window.location.hash.substring(1);
                const entries = document.querySelectorAll(".diary-entry");
                const timelineBars = document.querySelectorAll(".timeline-bar");

                entries.forEach(entry => entry.classList.remove("active"));
                timelineBars.forEach(bar => bar.classList.remove("selected"));

                if (hash && /^\d{8}$/.test(hash)) {
                    const entry = document.getElementById(hash);
                    if (entry) {
                        entry.classList.add("active");

                        const entryRight = entry.offsetLeft + entry.clientWidth;
                        const container = document.getElementById("diaryContainer");
                        const containerWidth = container.clientWidth;
                        this.scrollTo(container, entryRight - containerWidth);

                        const content = entry.querySelector(".content");
                        const charCount = content ? content.textContent.length : 0;

                        this.playBeepFromEntry(hash);
                        this.triggerHapticFeedback(charCount);

                        const selectedBar = document.querySelector(`.timeline-bar[data-yyyymmdd="${hash}"]`);
                        if (selectedBar) selectedBar.classList.add("selected");
                    }
                } else if (entries.length > 0) {
                    const latestEntry = entries[0];
                    latestEntry.classList.add("active");

                    const entryRight = latestEntry.offsetLeft + latestEntry.clientWidth;
                    const container = document.getElementById("diaryContainer");
                    const containerWidth = container.clientWidth;
                    this.scrollTo(container, entryRight - containerWidth);

                    const content = latestEntry.querySelector(".content");
                    const charCount = content ? content.textContent.length : 0;

                    this.playBeepFromEntry(latestEntry.id);
                    this.triggerHapticFeedback(charCount);

                    const selectedBar = document.querySelector(`.timeline-bar[data-yyyymmdd="${latestEntry.id}"]`);
                    if (selectedBar) selectedBar.classList.add("selected");
                }
            }
            static scrollTo(element, targetPosition) {
                element.scrollLeft = targetPosition;
            }
            static getNavigationThreshold(entryId) {
                const metrics = this.getEntryMetrics(entryId);

                const charFactor = Math.min(220, metrics.charCount * 0.18);
                const windFactor = Math.min(60, metrics.wind * 8);
                const stepsFactor = Math.min(50, metrics.steps / 500);

                return 90 + charFactor + windFactor + stepsFactor;
            }
            static handleKeyDown(e) {
                if (e.key === "ArrowLeft" || e.key === "ArrowRight") {
                    e.preventDefault();
                    const direction = e.key === "ArrowLeft" ? -1 : 1;
                    this.navigateByDirection(direction, true);
                } else if (e.key === "Escape" && window.location.hash) {
                    window.location.hash = "";
                } else if (e.key === " ") {
                    // スペースキーでfake-mode切り替え
                    if (this.lastSpaceTime && Date.now() - this.lastSpaceTime < 100) return;
                    this.lastSpaceTime = Date.now();
                    this.toggleFakeMode();
                }
            }

            static getCurrentEntry() {
                const hash = window.location.hash.substring(1);
                if (hash && /^\d{8}$/.test(hash)) return document.getElementById(hash);

                const entries = this.getNavigableEntries();
                return entries.length > 0 ? entries[0] : null;
            }

            static getAdjacentEntry(currentEntry, direction) {
                const entries = this.getNavigableEntries();
                const currentIndex = Array.from(entries).indexOf(currentEntry);
                if (currentIndex === -1) return null;

                const nextIndex = currentIndex + direction;
                if (nextIndex < 0 || nextIndex >= entries.length) return null;
                return entries[nextIndex];
            }

            static getNavigableEntries() {
                const allEntries = Array.from(document.querySelectorAll(".diary-entry"));

                if (this.isSearchMode) {
                    if (!this.hasSearchResults) return [];
                    return allEntries.filter(entry => entry.style.display !== 'none');
                }

                return allEntries;
            }

            static updateTimelineSearchState(matchedEntryIds = null) {
                const timeline = document.getElementById("timeline");
                if (!timeline) return;

                const bars = Array.from(timeline.querySelectorAll(".timeline-bar"));
                bars.forEach(bar => bar.classList.remove("search-hit"));

                const shouldHighlightSearch = this.searchQuery.trim().length > 0;
                timeline.classList.toggle("search-active", shouldHighlightSearch);
                if (!shouldHighlightSearch) return;

                const ids = matchedEntryIds ?? new Set(
                    Array.from(document.querySelectorAll('.diary-entry'))
                        .filter(entry => entry.style.display !== 'none')
                        .map(entry => entry.id)
                );

                bars.forEach(bar => {
                    if (ids.has(bar.dataset.yyyymmdd)) {
                        bar.classList.add("search-hit");
                    }
                });
            }

            static downloadDiaryAsText() {
                if (this.diaryEntries.length === 0) {
                    alert("ダウンロードする日記がありません。");
                    return;
                }

                const sortedEntries = [...this.diaryEntries].sort((a, b) => a.yyyymmdd.localeCompare(b.yyyymmdd));
                const oldestDate = sortedEntries[0].yyyymmdd;
                const newestDate = sortedEntries[sortedEntries.length - 1].yyyymmdd;
                const modePrefix = this.isFakeMode ? "裏日記_" : "";
                const filename = `${modePrefix}誤字ロマの日記 ${oldestDate}-${newestDate}.txt`;

                let content = "";
                sortedEntries.forEach(entry => {
                    const dateObj = DiaryUtils.formatJapaneseDate(entry.yyyymmdd);
                    content += `${dateObj.long}\n${entry.content}\n\n`;
                });

                const blob = new Blob([content], { type: "text/plain" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            static updatePageTitle(count) {
                const pageTitleInput = document.getElementById('pageTitleInput');
                if (pageTitleInput) {
                    if (!this.isSearchMode) {
                        const displayText = this.isFakeMode
                            ? `裏・誤字ロマの${count}日`
                            : `誤字ロマの${count}日`;
                        pageTitleInput.placeholder = displayText; // 追加: placeholderに同じ値を設定
                    }
                }
            }
            static getEntryMetrics(yyyymmdd) {
                const dateForWeather = `${yyyymmdd.substring(0, 4)}/${yyyymmdd.substring(4, 6)}/${yyyymmdd.substring(6, 8)}`;
                const dateForSteps = `${yyyymmdd.substring(0, 4)}-${yyyymmdd.substring(4, 6)}-${yyyymmdd.substring(6, 8)}`;

                const entry = this.diaryEntries.find(item => item.yyyymmdd === yyyymmdd) || null;
                const weather = this.weatherData.find(w => w.date === dateForWeather) || null;
                const stepsEntry = this.stepsData.find(s => s.date === dateForSteps) || null;

                return {
                    charCount: entry?.content?.length ?? 0,
                    temp: weather?.avgTemp ?? 18,
                    wind: weather?.avgWind ?? 1.5,
                    steps: stepsEntry?.steps ?? 4000
                };
            }

            static normalizeMetric(value, min, max) {
                if (max <= min) return 0;
                return Math.min(1, Math.max(0, (value - min) / (max - min)));
            }
            static async playBeep(frequency = 440, duration = 0.1, gainValue = 0.1) {
                if (!this.audioContext) {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    await this.audioContext.resume();
                } else if (this.audioContext.state === "suspended") {
                    await this.audioContext.resume();
                }

                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);

                oscillator.type = 'sine';
                oscillator.frequency.value = frequency;
                gainNode.gain.value = gainValue;
                gainNode.gain.exponentialRampToValueAtTime(0.0001, this.audioContext.currentTime + duration);

                oscillator.start();
                oscillator.stop(this.audioContext.currentTime + duration);

                this.currentOscillator = oscillator;
            }
            static async playBeepFromEntry(yyyymmdd) {
                const metrics = this.getEntryMetrics(yyyymmdd);

                try {
                    if (!this.audioContext) {
                        this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        await this.audioContext.resume();
                    } else if (this.audioContext.state === "suspended") {
                        await this.audioContext.resume();
                    }

                    const now = this.audioContext.currentTime;
                    const charCount = metrics.charCount;
                    const steps = metrics.steps;
                    const temp = metrics.temp;
                    const windSpeed = metrics.wind;
                    const isFake = this.isFakeMode;

                    // 1. Main melody (char count)
                    const rootFrequency = 120 + (charCount * 0.1); // 200Hz ~ 600Hz
                    const adjustedRootFreq = rootFrequency + (temp >= 18 ? 50 : -50); // Adjust pitch based on temperature
                    const melodyType = isFake ? "triangle" : "sawtooth"; // More natural sound for melody

                    // 2. Steps rhythm (drum-like)
                    const rhythmFreq = 200 + (steps * 0.1); // 200Hz ~ 400Hz
                    const rhythmPattern = steps <= 8000 ? [0.25, 0.25] : [0.125, 0.125, 0.125, 0.125]; // 4th or 8th notes
                    const rhythmType = isFake ? "sawtooth" : "square"; // More drum-like

                    // 3. Wind speed (wind noise)
                    const baseDuration = 0.5;
                    const maxDuration = 3;
                    const duration = Math.min(maxDuration, baseDuration + (windSpeed * 0.12));
                    const reverbTime = 0.3 + (windSpeed * 0.55);

                    // 4. Gain settings
                    const masterGain = this.audioContext.createGain();
                    masterGain.gain.value = isFake ? 0.82 : 0.88; // Adjust overall volume
                    masterGain.connect(this.audioContext.destination);

                    // 5. Reverb settings
                    const convolver = this.audioContext.createConvolver();
                    const reverbGain = this.audioContext.createGain();
                    reverbGain.gain.value = 0.4;
                    convolver.connect(reverbGain);
                    reverbGain.connect(masterGain);

                    // Simple impulse response
                    const impulse = this.audioContext.createBuffer(2, this.audioContext.sampleRate * reverbTime, this.audioContext.sampleRate);
                    for (let channel = 0; channel < impulse.numberOfChannels; channel++) {
                        const channelData = impulse.getChannelData(channel);
                        for (let i = 0; i < channelData.length; i++) {
                            channelData[i] = (Math.random() * 2 - 1) * 0.4;
                        }
                    }
                    convolver.buffer = impulse;

                    // 6. Main melody (char count)
                    const melodyOsc = this.audioContext.createOscillator();
                    const melodyGain = this.audioContext.createGain();
                    melodyOsc.type = melodyType;
                    melodyOsc.frequency.setValueAtTime(adjustedRootFreq, now);
                    melodyGain.gain.setValueAtTime(0.06, now);
                    melodyGain.gain.exponentialRampToValueAtTime(0.0001, now + duration * 1.2); // Fade out
                    melodyOsc.connect(melodyGain);
                    melodyGain.connect(reverbGain);
                    melodyOsc.start(now);
                    melodyOsc.stop(now + duration);

                    // 7. Steps rhythm (drum-like)
                    rhythmPattern.forEach((delay, index) => {
                        const rhythmOsc = this.audioContext.createOscillator();
                        const rhythmGain = this.audioContext.createGain();

                        rhythmOsc.type = rhythmType;
                        rhythmOsc.frequency.setValueAtTime(rhythmFreq, now + (delay * index));
                        rhythmGain.gain.setValueAtTime(0, now + (delay * index));
                        rhythmGain.gain.linearRampToValueAtTime(0.05, now + (delay * index) + 0.01); // Sharp attack
                        rhythmGain.gain.linearRampToValueAtTime(0, now + (delay * index) + 0.05); // Sharp decay

                        rhythmOsc.connect(rhythmGain);
                        rhythmGain.connect(reverbGain);

                        rhythmOsc.start(now + (delay * index));
                        rhythmOsc.stop(now + (delay * index) + 0.08);
                    });

                    // 8. Wind speed (wind noise)
                    const windNoise = this.audioContext.createBufferSource();
                    const windGain = this.audioContext.createGain();
                    const noiseBuffer = this.audioContext.createBuffer(1, this.audioContext.sampleRate * duration, this.audioContext.sampleRate);
                    const channelData = noiseBuffer.getChannelData(0);
                    for (let i = 0; i < channelData.length; i++) {
                        channelData[i] = (Math.random() * 2 - 1) * 0.1;
                    }
                    windNoise.buffer = noiseBuffer;
                    windGain.gain.value = windSpeed * 0.002; // Wind speed affects volume
                    windNoise.connect(windGain);
                    windGain.connect(reverbGain);
                    windNoise.start(now);
                    windNoise.stop(now + duration);

                    masterGain.gain.exponentialRampToValueAtTime(0.0001, now + Math.max(duration, duration * 1.2));
                    this.currentOscillator = melodyOsc;
                } catch (error) {
                    console.error("Audio playback failed:", error);
                }
            }
            static async loadWeatherAndStepsData() {
                try {
                    const weatherResponse = await fetch("data.csv");
                    if (!weatherResponse.ok) {
                        throw new Error(`Failed to load data.csv: ${weatherResponse.status}`);
                    }
                    const weatherCSV = await weatherResponse.text();
                    this.weatherData = this.parseWeatherCSV(weatherCSV);
                } catch (error) {
                    console.error("Error loading data.csv:", error);
                    this.weatherData = [];
                }

                try {
                    const stepsResponse = await fetch("steps.csv");
                    if (!stepsResponse.ok) {
                        throw new Error(`Failed to load steps.csv: ${stepsResponse.status}`);
                    }
                    const stepsCSV = await stepsResponse.text();
                    this.stepsData = this.parseStepsCSV(stepsCSV);
                } catch (error) {
                    console.error("Error loading steps.csv:", error);
                    this.stepsData = [];
                }
            }

            static parseStepsCSV(csv) {
                const lines = csv.split("\n").filter(line => line.trim());
                return lines.slice(1).map(line => {
                    const [date, steps] = line.split(",").map(v => v.trim());
                    return {
                        date: date.replace(/(\d+)\/(\d+)\/(\d+)/, (_, y, m, d) =>
                            `${y}-${m.padStart(2, "0")}-${d.padStart(2, "0")}`
                        ),
                        steps: parseInt(steps, 10)
                    };
                }).filter(row => !Number.isNaN(row.steps));
            }

            static parseWeatherCSV(csv) {
                const lines = csv.split("\n").filter(line => line.trim());
                return lines.slice(1).map(line => {
                    const [date, avgTemp, , , avgWind] = line.split(",").map(v => v.trim());

                    const normalizedDate = date.replace(/(\d+)\/(\d+)\/(\d+)/, (_, y, m, d) =>
                        `${y}/${m.padStart(2, "0")}/${d.padStart(2, "0")}`
                    );

                    return {
                        date: normalizedDate,
                        avgTemp: parseFloat(avgTemp),
                        avgWind: parseFloat(avgWind)
                    };
                }).filter(row => !Number.isNaN(row.avgTemp) && !Number.isNaN(row.avgWind));
            }
        }

        DiaryApp.init();

        document.addEventListener("keydown", function (event) {
            if (event.key === "i" || event.key === "I") {
                if (!["INPUT", "TEXTAREA"].includes(document.activeElement.tagName)) {
                    event.preventDefault();
                    window.location.href = "write.html";
                }
            }
        });


    </script>
