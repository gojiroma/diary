<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="縦書き日記アプリ。偽日記と本日記の2ペイン対応。GitHub連携で自動保存。">
    <meta name="date" content="2026-02-27">
    <title>かくぞう</title>
    <link rel="icon" href="icon-write.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho&display=swap" rel="stylesheet">
    <style>
        ::-webkit-scrollbar {
            display: none;
        }

        @font-face {
            font-family: 'gojiromanus';
            src: url('gojiromanus.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            background-color: #f5f5f5;
            color: #333;
            font-family: "gojiromanus", serif;
            font-weight: 400;
            font-style: normal;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 0;
            position: relative;
        }

        .diary-container {
            width: 95%;
            max-width: 1000px;
            height: 90vh;
            min-height: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .diary-boxes {
            width: 100%;
            flex: 1;
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            height: 800px;
        }

        .diary-box {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .diary-box textarea {
            flex: 1;
            background-color: #fff;
            color: #333;
            border: 1px solid #ddd;
            resize: none;
            font-size: 16px;
            line-height: 1.5;
            padding: 20px;
            border-radius: 20px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 1.2em;
            writing-mode: vertical-rl;
            text-orientation: upright;
        }

        .diary-box textarea:focus {
            outline: none;
            border-color: #aaa;
        }

        .date-display {
            display: flex;
            justify-content: center;
            align-items: center;
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 1.2em;
            padding: 10px;
            color: #666;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
            border-radius: 10px;
        }

        .date-display:hover {
            background-color: rgba(0, 0, 0, 0.05);
        }

        .date-display:active {
            transform: scale(0.98);
            background-color: rgba(0, 0, 0, 0.1);
        }

        .date-nav {
            cursor: pointer;
            font-size: 1.5em;
            margin: 0 10px;
            color: #666;
            transition: color 0.2s;
        }

        .date-nav:hover {
            color: #333;
        }

        .date-text {
            writing-mode: vertical-rl;
            text-orientation: upright;
            transition: color 0.2s;
        }

        .date-display:active .date-text {
            color: #4CAF50;
        }

        .toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 10px;
            padding: 16px;
            position: fixed;
            z-index: 1;
            right: 30px;
            top: 30px;
            font-size: 16px;
            opacity: 0;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .toast.show {
            visibility: visible;
            opacity: 1;
        }

        /* フローティングボタン */
        .floating-token-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background-color: #4CAF50;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            font-size: 24px;
            transition: all 0.2s;
        }

        .floating-token-btn:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }

        /* モーダルスタイル */
        .modal {
            display: none;
            position: fixed;
            z-index: 1001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: #fff;
            margin: 15% auto;
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            max-width: 500px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .modal-content button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 10px 5px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .modal-content button:hover {
            background-color: #45a049;
        }

        @media (max-width: 600px) {
            .diary-boxes {
                flex-direction: column;
            }

            .date-display {
                writing-mode: horizontal-tb;
                text-orientation: mixed;
                flex-direction: row;
                justify-content: center;
            }

            .date-nav {
                writing-mode: horizontal-tb;
                text-orientation: mixed;
            }

            .date-text {
                writing-mode: horizontal-tb;
                text-orientation: mixed;
            }
        }
    </style>
</head>

<body>
    <div id="tokenModal" class="modal">
        <div class="modal-content">
            <h2>GitHub Token を入力</h2>
            <p>日記の保存・読み込みに GitHub Personal Access Token が必要です。</p>
            <input type="password" id="tokenInput" placeholder="GitHub Personal Access Token">
            <div>
                <button id="saveToken">保存</button>
                <button id="cancelToken">キャンセル</button>
            </div>
        </div>
    </div>

    <div id="floatingTokenButton" class="floating-token-btn">🔑</div>

    <div class="diary-container">
        <div class="diary-boxes">
            <div class="diary-box">
                <textarea id="fakeDiary" placeholder="偽日記を入力..."></textarea>
            </div>
            <div class="date-display" id="dateDisplayContainer">
                <span class="date-nav" id="prevDay">↑・</span>
                <span class="date-text" id="dateDisplay"></span>
                <span class="date-nav" id="nextDay">・↓</span>
            </div>
            <div class="diary-box">
                <textarea id="realDiary" placeholder="本日記を入力..."></textarea>
            </div>
        </div>
    </div>
    <div id="toast" class="toast"></div>
    <script>
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.backgroundColor = isError ? '#ff4444' : '#4CAF50';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        const formatDateKey = (date, forMd = true) => {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return forMd ? `${year}${month}${day}` : `${year}/${month}/${day}`;
        };

        const toKanjiNumber = (num) => ['〇', '一', '二', '三', '四', '五', '六', '七', '八', '九'][num] || num;
        const toKanjiMonth = (month) => ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'][month - 1];
        const toKanjiDay = (day) => {
            if (day === 10) return '十';
            if (day === 20) return '二十';
            if (day === 30) return '三十';
            if (day < 10) return toKanjiNumber(day);
            if (day < 20) return '十' + toKanjiNumber(day - 10);
            if (day < 30) return '二十' + toKanjiNumber(day - 20);
            return toKanjiNumber(day);
        };
        const formatJapaneseDate = (date) => {
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const dayOfWeek = ['日', '月', '火', '水', '木', '金', '土'][date.getDay()];
            return `令和${toKanjiNumber(year - 2018)}年${toKanjiMonth(month)}${toKanjiDay(day)}日（${dayOfWeek}）`;
        };

        const realDiary = document.getElementById('realDiary');
        const fakeDiary = document.getElementById('fakeDiary');
        const dateDisplay = document.getElementById('dateDisplay');
        const prevDayButton = document.getElementById('prevDay');
        const nextDayButton = document.getElementById('nextDay');
        const tokenModal = document.getElementById('tokenModal');
        const tokenInput = document.getElementById('tokenInput');
        const saveTokenButton = document.getElementById('saveToken');
        const cancelTokenButton = document.getElementById('cancelToken');
        const floatingTokenButton = document.getElementById('floatingTokenButton');

        let currentDate = new Date();
        let currentDateKeyMd = formatDateKey(currentDate, true);
        let currentDateKeyCsv = formatDateKey(currentDate, false);
        let cachedDiaryContent = null;
        let cachedFakeContent = null;

        dateDisplay.textContent = formatJapaneseDate(currentDate);

        // localStorageから復元
        function restoreFromLocalStorage() {
            const savedRealDiary = localStorage.getItem(`realDiary_${currentDateKeyMd}`);
            const savedFakeDiary = localStorage.getItem(`fakeDiary_${currentDateKeyMd}`);
            realDiary.value = savedRealDiary || '';
            fakeDiary.value = savedFakeDiary || '';
        }

        // localStorageに保存
        function saveToLocalStorage() {
            localStorage.setItem(`realDiary_${currentDateKeyMd}`, realDiary.value);
            localStorage.setItem(`fakeDiary_${currentDateKeyMd}`, fakeDiary.value);
        }

        // 入力イベントでlocalStorageに保存
        realDiary.addEventListener('input', saveToLocalStorage);
        fakeDiary.addEventListener('input', saveToLocalStorage);

        async function fetchGitHubFile(fileName, token) {
            try {
                const apiUrl = `https://api.github.com/repos/gojiroma/diary/contents/${fileName}`;
                const response = await fetch(apiUrl, { headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' } });
                if (!response.ok) throw new Error(`Failed to fetch ${fileName}`);
                const fileData = await response.json();
                return await (await fetch(fileData.download_url)).text();
            } catch (error) {
                console.error(`Error fetching ${fileName}:`, error);
                return null;
            }
        }

        function extractEntry(content, dateKeyMd, dateKeyCsv) {
            if (!content) return null;
            const datePattern = dateKeyMd + '|' + dateKeyCsv.replace(/\//g, '\\/');
            const entryRegex = new RegExp(`date:\\s*(${datePattern})[\\s\\S]*?content:\\s*\\|([\\s\\S]*?)(?=---|\\n\\s*date:|$)`, 'i');
            const match = content.match(entryRegex);
            return match ? match[2].trim().replace(/^\s{2}/gm, '') : null;
        }

        async function loadEntriesForDate(date) {
            const dateKeyMd = formatDateKey(date, true);
            const dateKeyCsv = formatDateKey(date, false);
            const token = localStorage.getItem('githubToken');
            if (!token) return;

            try {
                if (!cachedDiaryContent || !cachedFakeContent) {
                    [cachedDiaryContent, cachedFakeContent] = await Promise.all([
                        fetchGitHubFile('entry.md', token),
                        fetchGitHubFile('fake.md', token)
                    ]);
                }

                // localStorageから現在の入力内容を取得
                const savedRealDiary = localStorage.getItem(`realDiary_${dateKeyMd}`);
                const savedFakeDiary = localStorage.getItem(`fakeDiary_${dateKeyMd}`);

                // GitHubからデータを取得
                const diaryEntry = extractEntry(cachedDiaryContent, dateKeyMd, dateKeyCsv);
                const fakeEntry = extractEntry(cachedFakeContent, dateKeyMd, dateKeyCsv);

                // localStorageの内容を優先し、GitHubの内容は空欄の場合のみ使用
                realDiary.value = savedRealDiary !== null ? savedRealDiary : (diaryEntry || '');
                fakeDiary.value = savedFakeDiary !== null ? savedFakeDiary : (fakeEntry || '');
            } catch (error) {
                console.error('Error loading entries:', error);
                showToast('エントリの読み込みに失敗しました。', true);
            }
        }

        function moveToDate(date) {
            saveToLocalStorage();
            currentDate = date;
            currentDateKeyMd = formatDateKey(currentDate, true);
            currentDateKeyCsv = formatDateKey(currentDate, false);
            dateDisplay.textContent = formatJapaneseDate(currentDate);
            restoreFromLocalStorage();
            loadEntriesForDate(currentDate);
        }

        prevDayButton.addEventListener('click', () => {
            const newDate = new Date(currentDate);
            newDate.setDate(newDate.getDate() - 1);
            moveToDate(newDate);
        });

        nextDayButton.addEventListener('click', () => {
            const newDate = new Date(currentDate);
            newDate.setDate(newDate.getDate() + 1);
            moveToDate(newDate);
        });

        async function updateMultipleFiles(token, dateKeyMd, dateKeyCsv, realContent, fakeContent) {
            const repoOwner = 'gojiroma';
            const repoName = 'diary';
            const branch = 'main';
            const baseUrl = `https://api.github.com/repos/${repoOwner}/${repoName}`;

            try {
                const refResponse = await fetch(`${baseUrl}/git/refs/heads/${branch}`, { headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' } });
                if (!refResponse.ok) throw new Error('Failed to get branch');
                const refData = await refResponse.json();
                const latestCommitSha = refData.object.sha;

                const commitResponse = await fetch(`${baseUrl}/git/commits/${latestCommitSha}`, { headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' } });
                if (!commitResponse.ok) throw new Error('Failed to get commit');
                const commitData = await commitResponse.json();
                const latestTreeSha = commitData.tree.sha;

                const treeResponse = await fetch(`${baseUrl}/git/trees`, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        base_tree: latestTreeSha,
                        tree: [
                            { path: 'entry.md', mode: '100644', type: 'blob', content: realContent },
                            { path: 'fake.md', mode: '100644', type: 'blob', content: fakeContent }
                        ]
                    })
                });
                if (!treeResponse.ok) throw new Error('Failed to create tree');
                const treeData = await treeResponse.json();
                const newTreeSha = treeData.sha;

                const newCommitResponse = await fetch(`${baseUrl}/git/commits`, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Update entries for ${dateKeyMd}`, tree: newTreeSha, parents: [latestCommitSha] })
                });
                if (!newCommitResponse.ok) throw new Error('Failed to create commit');
                const newCommitData = await newCommitResponse.json();
                const newCommitSha = newCommitData.sha;

                await fetch(`${baseUrl}/git/refs/heads/${branch}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sha: newCommitSha })
                });

                cachedDiaryContent = realContent;
                cachedFakeContent = fakeContent;

                return true;
            } catch (error) {
                console.error('Error updating files:', error);
                showToast('更新に失敗しました。', true);
                return false;
            }
        }

        dateDisplay.addEventListener('click', async () => {
            const token = localStorage.getItem('githubToken');
            if (!token) {
                tokenModal.style.display = 'block';
                return;
            }

            try {
                let newEntryContent = cachedDiaryContent || '';
                let newFakeContent = cachedFakeContent || '';

                const entryRegexMd = new RegExp(`date:\\s*${currentDateKeyMd}[\\s\\S]*?(?=---|$)`);
                const entryRegexCsv = new RegExp(`date:\\s*${currentDateKeyCsv.replace(/\//g, '\\/')}[\\s\\S]*?(?=---|$)`);

                // 本日記の更新
                if (realDiary.value.trim()) {
                    if (entryRegexMd.test(newEntryContent)) {
                        newEntryContent = newEntryContent.replace(entryRegexMd, `date: ${currentDateKeyMd}\ncontent: |\n  ${realDiary.value.replace(/\n/g, '\n  ')}\n---`);
                    } else if (entryRegexCsv.test(newEntryContent)) {
                        newEntryContent = newEntryContent.replace(entryRegexCsv, `date: ${currentDateKeyMd}\ncontent: |\n  ${realDiary.value.replace(/\n/g, '\n  ')}\n---`);
                    } else {
                        newEntryContent += `\n---\ndate: ${currentDateKeyMd}\ncontent: |\n  ${realDiary.value.replace(/\n/g, '\n  ')}\n---`;
                    }
                } else {
                    // 本日記が空の場合、該当エントリを削除
                    newEntryContent = newEntryContent.replace(entryRegexMd, '');
                    newEntryContent = newEntryContent.replace(entryRegexCsv, '');
                }

                // 偽日記の更新
                if (fakeDiary.value.trim()) {
                    if (entryRegexMd.test(newFakeContent)) {
                        newFakeContent = newFakeContent.replace(entryRegexMd, `date: ${currentDateKeyMd}\ncontent: |\n  ${fakeDiary.value.replace(/\n/g, '\n  ')}\n---`);
                    } else if (entryRegexCsv.test(newFakeContent)) {
                        newFakeContent = newFakeContent.replace(entryRegexCsv, `date: ${currentDateKeyMd}\ncontent: |\n  ${fakeDiary.value.replace(/\n/g, '\n  ')}\n---`);
                    } else {
                        newFakeContent += `\n---\ndate: ${currentDateKeyMd}\ncontent: |\n  ${fakeDiary.value.replace(/\n/g, '\n  ')}\n---`;
                    }
                } else {
                    // 偽日記が空の場合、該当エントリを削除
                    newFakeContent = newFakeContent.replace(entryRegexMd, '');
                    newFakeContent = newFakeContent.replace(entryRegexCsv, '');
                }

                const success = await updateMultipleFiles(token, currentDateKeyMd, currentDateKeyCsv, newEntryContent, newFakeContent);
                if (success) {
                    showToast('保存しました。');
                    loadEntriesForDate(currentDate);
                }
            } catch (error) {
                console.error('Error sending update:', error);
                showToast('送信に失敗しました。', true);
            }
        });

        // モーダル関連の処理
        saveTokenButton.addEventListener('click', () => {
            const token = tokenInput.value.trim();
            if (token) {
                localStorage.setItem('githubToken', token);
                tokenModal.style.display = 'none';
                tokenInput.value = '';
                floatingTokenButton.style.display = 'none';
                showToast('トークンを保存しました。');
                loadEntriesForDate(currentDate);
            } else {
                showToast('トークンを入力してください。', true);
            }
        });

        cancelTokenButton.addEventListener('click', () => {
            tokenModal.style.display = 'none';
            tokenInput.value = '';
        });

        floatingTokenButton.addEventListener('click', () => {
            tokenModal.style.display = 'block';
        });

        window.addEventListener('load', () => {
            if (localStorage.getItem('githubToken')) {
                floatingTokenButton.style.display = 'none';
                restoreFromLocalStorage();
                loadEntriesForDate(currentDate);
            }
        });
    </script>
</body>

</html>
