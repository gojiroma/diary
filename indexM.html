<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>流 - 両面</title>
    <style>
        @font-face {
            font-family: 'gojiromanus';
            src: url('https://nikki.poet.blue/gojiromanus.otf') format('opentype');
            font-display: swap;
        }

        :root {
            --bg-color: #271f2c;
            --text-color: #8fbcf2;
            --fake-text: #a7be80; /* 裏日記の色 */
            --font-size: 7svh; 
            --scroll-speed: 3; 
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'gojiromanus', serif;
            overflow: hidden; 
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #flow-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            writing-mode: vertical-rl;
            text-orientation: upright;
            position: relative;
        }

        .flow-item {
            display: inline-block;
            font-size: var(--font-size);
            line-height: 1;
            white-space: nowrap;
            position: absolute;
            top: 100%;
            will-change: transform;
        }

        /* 裏日記のスタイル */
        .is-fake {
            color: var(--fake-text);
        }

        /* 日付の境界線 */
        .day-separator {
            height: 2px;
            background: currentColor;
            opacity: 0.3;
            margin: 20px 0;
            width: 80%;
            align-self: center;
        }

        #date-overlay {
            position: fixed;
            top: calc(25px + env(safe-area-inset-top, 0px));
            right: calc(20px + env(safe-area-inset-right, 0px));
            font-size: 1.4rem;
            z-index: 100;
            opacity: 0.8;
            letter-spacing: 0.3em;
            writing-mode: vertical-rl;
            text-orientation: upright;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
        }

        .date-update {
            opacity: 0 !important;
            transform: translateY(-10px);
        }
    </style>
</head>
<body>

    <div id="date-overlay"></div>
    <div id="flow-container"></div>

    <script>
        const BASE_URL = 'https://nikki.poet.blue/';
        let timeline = [];
        let currentIndex = 0;

        function convertToKanji(num) {
            const kanjiNums = ['', '一', '二', '三', '四', '五', '六', '七', '八', '九'];
            if (num === 10) return '十';
            if (num < 10) return kanjiNums[num];
            if (num < 20) return '十' + kanjiNums[num % 10];
            const ten = Math.floor(num / 10);
            const one = num % 10;
            return (ten === 1 ? '' : kanjiNums[ten]) + '十' + kanjiNums[one];
        }

        function toKanjiDate(yyyymmdd) {
            const m = parseInt(yyyymmdd.substring(4, 6));
            const d = parseInt(yyyymmdd.substring(6, 8));
            return `${convertToKanji(m)}月${convertToKanji(d)}日`;
        }

        async function fetchAndParse(file, isFake) {
            const response = await fetch(BASE_URL + file);
            const text = await response.text();
            return text.split('---').filter(e => e.trim()).map(entry => {
                const dateMatch = entry.match(/date:\s*(.*)/);
                const contentMatch = entry.match(/content:\s*\|\s*\n([\s\S]*?)(?=\n---|\n$|$)/m);
                return {
                    date: dateMatch ? dateMatch[1].trim() : '00000000',
                    content: contentMatch ? contentMatch[1].replace(/^\s*\|?\s*/gm, '').replace(/\n/g, '　').trim() : '',
                    isFake: isFake
                };
            });
        }

        async function init() {
            try {
                const [normal, fake] = await Promise.all([
                    fetchAndParse('entry.md', false),
                    fetchAndParse('fake.md', true)
                ]);

                // 日付ごとにグループ化
                const groups = {};
                [...normal, ...fake].forEach(e => {
                    if (!groups[e.date]) groups[e.date] = [];
                    groups[e.date].push(e);
                });

                // 日付順（降順）にソートし、各日の「表→裏」の順でフラットなリストにする
                const sortedDates = Object.keys(groups).sort((a, b) => b.localeCompare(a));
                sortedDates.forEach(date => {
                    // 同一日のなかで表が先、裏が後
                    const dayEntries = groups[date].sort((a, b) => a.isFake - b.isFake);
                    dayEntries.forEach((entry, index) => {
                        // 日付の最初の要素にフラグを立てる
                        timeline.push({ ...entry, isNewDay: index === 0 });
                    });
                });

                if (timeline.length > 0) spawn();
            } catch (e) { console.error(e); }
        }

        function updateDateLabel(dateStr) {
            const el = document.getElementById('date-overlay');
            if (el.innerText !== dateStr) {
                el.classList.add('date-update');
                setTimeout(() => {
                    el.innerText = dateStr;
                    el.classList.remove('date-update');
                }, 300);
            }
        }

        function spawn() {
            if (currentIndex >= timeline.length) currentIndex = 0;
            const entry = timeline[currentIndex];
            
            const textEl = document.createElement('div');
            textEl.className = `flow-item ${entry.isFake ? 'is-fake' : ''}`;
            
            // 日付が変わるタイミングで記号を挿入
            const prefix = entry.isNewDay ? " ◆ " : "";
            textEl.innerText = prefix + entry.content;
            
            document.getElementById('flow-container').appendChild(textEl);

            const textHeight = textEl.offsetHeight;
            const windowHeight = window.innerHeight;
            const totalDistance = windowHeight + textHeight;
            const speed = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--scroll-speed'));

            const animation = textEl.animate([
                { transform: `translateY(0px)` },
                { transform: `translateY(-${totalDistance}px)` }
            ], { duration: totalDistance * speed, easing: 'linear' });

            // 日付更新タイミング（画面下から少し上がった位置）
            setTimeout(() => {
                updateDateLabel(toKanjiDate(entry.date));
            }, 100 * speed);

            // 次の読み込み（重なり防止：今のテキストが完全に通り過ぎるのを待つ）
            setTimeout(() => {
                currentIndex++;
                spawn();
            }, (textHeight + 20) * speed); 

            animation.onfinish = () => textEl.remove();
        }

        init();
    </script>
</body>
</html>
