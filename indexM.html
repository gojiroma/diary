<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>誤字ロマの日記 - Vertical Focus</title>
    <style>
        @font-face {
            font-family: 'gojiromanus';
            src: url('https://nikki.poet.blue/gojiromanus.otf') format('opentype');
            font-display: swap;
        }

        :root {
            --bg-color: #271f2c;
            --text-color: #8fbcf2;
            --fake-bg: #19100d;
            --fake-text: #a7be80;
            --font-size: 15vh; /* スマホで1列が際立つサイズ */
            --transition: 0.5s ease;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'gojiromanus', serif;
            overflow: hidden;
            transition: background-color var(--transition), color var(--transition);
        }

        body.fake-mode {
            background-color: var(--fake-bg);
            color: var(--fake-text);
        }

        /* 日付ヘッダー */
        #date-display {
            position: fixed;
            top: env(safe-area-inset-top, 20px);
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            z-index: 100;
            opacity: 0.8;
            letter-spacing: 0.1em;
            text-align: center;
            width: 100%;
            cursor: pointer;
        }

        /* 縦書きコンテナ */
        .marquee-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            writing-mode: vertical-rl;
            text-orientation: upright;
            padding: 0 10px;
            box-sizing: border-box;
        }

        /* アニメーションの開始位置を工夫 */
        .marquee-content {
            display: inline-block;
            font-size: var(--font-size);
            line-height: 1.1;
            white-space: nowrap;
            /* 最初の開始位置を画面の上方(10vh)に設定 */
            transform: translateY(10vh); 
            animation: vertical-flow 20s linear infinite;
        }

        @keyframes vertical-flow {
            0% { transform: translateY(15vh); }
            100% { transform: translateY(-100%); }
        }

        /* ナビゲーション */
        .nav-btn {
            position: fixed;
            bottom: 40px;
            width: 65px;
            height: 65px;
            background: rgba(255, 255, 255, 0.05);
            color: inherit;
            border: 1px solid currentColor;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            z-index: 1000;
            backdrop-filter: blur(4px);
            -webkit-tap-highlight-color: transparent;
        }

        #prev-btn { left: 25px; }
        #next-btn { right: 25px; }

        /* 中央タップエリア（モード切替） */
        #tap-zone {
            position: fixed;
            top: 25%;
            left: 20%;
            width: 60%;
            height: 50%;
            z-index: 50;
        }
    </style>
</head>
<body>

    <div id="date-display">...</div>
    <div id="tap-zone"></div>

    <div class="marquee-container">
        <div id="marquee-text" class="marquee-content"></div>
    </div>

    <div id="prev-btn" class="nav-btn">＜</div>
    <div id="next-btn" class="nav-btn">＞</div>

    <script>
        const BASE_URL = 'https://nikki.poet.blue/';
        let allEntries = [];
        let currentIndex = 0;
        let isFakeMode = false;

        const dateDisplay = document.getElementById('date-display');
        const marqueeText = document.getElementById('marquee-text');

        // 漢数字変換 (提供されたDiaryUtilsを簡略化)
        function toKanjiDate(yyyymmdd) {
            const m = parseInt(yyyymmdd.substring(4, 6));
            const d = parseInt(yyyymmdd.substring(6, 8));
            const kanjiMonths = ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];
            return `${kanjiMonths[m-1]}${d}日${isFakeMode ? '（裏）' : ''}`;
        }

        async function loadEntries() {
            const fileName = isFakeMode ? 'fake.md' : 'entry.md';
            try {
                const response = await fetch(BASE_URL + fileName);
                const text = await response.text();
                parseMarkdown(text);
                renderEntry();
            } catch (e) {
                marqueeText.innerText = "読み込みエラー";
            }
        }

        function parseMarkdown(text) {
            // 元のコードと同様に '---' で分割し、最新が右（最後）にくるよう調整
            const entries = text.split('---').filter(e => e.trim());
            allEntries = entries.reverse().map(entry => {
                const dateMatch = entry.match(/date:\s*(.*)/);
                const contentMatch = entry.match(/content:\s*\|\s*\n([\s\S]*?)(?=\n---|\n$|$)/m);
                return {
                    date: dateMatch ? dateMatch[1].trim() : '',
                    content: contentMatch ? contentMatch[1].replace(/^\s*\|?\s*/gm, '').replace(/\n/g, '　').trim() : ''
                };
            });
        }

        function renderEntry() {
            if (allEntries.length === 0) return;
            const entry = allEntries[currentIndex];
            
            dateDisplay.innerText = toKanjiDate(entry.date);
            
            // アニメーションのリセット
            marqueeText.style.animation = 'none';
            marqueeText.offsetHeight; // 強制リフロー
            marqueeText.innerText = entry.content;
            
            // 速度計算（文字数に応じて可変、最低12秒）
            const duration = Math.max(12, entry.content.length * 0.45);
            // 0% (開始時) の位置を 15vh (画面上部) に設定しているので、すぐに読める
            marqueeText.style.animation = `vertical-flow ${duration}s linear infinite`;
        }

        // --- ナビゲーション ---
        document.getElementById('prev-btn').addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderEntry();
            }
        });

        document.getElementById('next-btn').addEventListener('click', () => {
            if (currentIndex < allEntries.length - 1) {
                currentIndex++;
                renderEntry();
            }
        });

        // --- モード切替（中央・日付タップ） ---
        [document.getElementById('tap-zone'), dateDisplay].forEach(el => {
            el.addEventListener('click', () => {
                isFakeMode = !isFakeMode;
                document.body.classList.toggle('fake-mode', isFakeMode);
                loadEntries();
            });
        });

        // 初回実行
        loadEntries();
    </script>
</body>
</html>
