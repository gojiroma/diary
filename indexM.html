<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>誤字ロマの日記 - Vertical Mode</title>
    <style>
        @font-face {
            font-family: 'gojiromanus';
            src: url('https://nikki.poet.blue/gojiromanus.otf') format('opentype');
            font-display: swap;
        }

        :root {
            --bg-color: #271f2c;
            --text-color: #8fbcf2;
            --fake-bg: #19100d;
            --fake-text: #a7be80;
            --font-size: 12vh; /* 画面の高さに応じた巨大な文字サイズ */
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'gojiromanus', serif;
            overflow: hidden;
            transition: background-color 0.5s, color 0.5s;
        }

        body.fake-mode {
            background-color: var(--fake-bg);
            color: var(--fake-text);
        }

        /* 日付表示 */
        #date-display {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            z-index: 100;
            opacity: 0.7;
            letter-spacing: 0.2em;
            writing-mode: horizontal-tb;
            white-space: nowrap;
        }

        /* メインコンテナ（縦書き） */
        .marquee-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            writing-mode: vertical-rl;
            text-orientation: upright;
        }

        /* 流れるテキストのラッパー */
        .marquee-content {
            display: inline-block;
            font-size: var(--font-size);
            line-height: 1.2;
            white-space: nowrap;
            animation: vertical-marquee 15s linear infinite;
        }

        @keyframes vertical-marquee {
            0% { transform: translateY(100vh); }
            100% { transform: translateY(-100%); }
        }

        /* ナビゲーションボタン */
        .nav-btn {
            position: fixed;
            bottom: 40px;
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.1);
            color: inherit;
            border: 1px solid currentColor;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            z-index: 1000;
            -webkit-tap-highlight-color: transparent;
        }

        #prev-btn { left: 20px; }
        #next-btn { right: 20px; }

        /* 中央タップでモード切替 */
        #toggle-zone {
            position: fixed;
            top: 20%;
            left: 20%;
            width: 60%;
            height: 60%;
            z-index: 50;
        }
    </style>
</head>
<body>

    <div id="date-display">読み込み中...</div>
    
    <div id="toggle-zone"></div>

    <div class="marquee-container">
        <div id="marquee-text" class="marquee-content"></div>
    </div>

    <div id="prev-btn" class="nav-btn">＜</div>
    <div id="next-btn" class="nav-btn">＞</div>

    <script>
        const BASE_URL = 'https://nikki.poet.blue/';
        let allEntries = [];
        let currentIndex = 0;
        let isFakeMode = false;

        const dateDisplay = document.getElementById('date-display');
        const marqueeText = document.getElementById('marquee-text');
        const body = document.body;

        async function loadEntries(mode) {
            const fileName = mode ? 'fake.md' : 'entry.md';
            try {
                const response = await fetch(BASE_URL + fileName);
                const text = await response.text();
                parseMarkdown(text);
                renderCurrentEntry();
            } catch (error) {
                console.error('データの取得に失敗しました:', error);
                marqueeText.innerText = "エラーが発生しました";
            }
        }

        function parseMarkdown(text) {
            const entries = text.split('---').filter(e => e.trim());
            allEntries = entries.reverse().map(entry => {
                const dateMatch = entry.match(/date:\s*(.*)/);
                const contentMatch = entry.match(/content:\s*\|\s*\n([\s\S]*?)(?=\n---|\n$|$)/m);
                return {
                    date: dateMatch ? dateMatch[1].trim() : '',
                    content: contentMatch ? contentMatch[1].replace(/^\s*\|?\s*/gm, '').replace(/\n/g, '　').trim() : ''
                };
            });
        }

        function renderCurrentEntry() {
            if (allEntries.length === 0) return;
            const entry = allEntries[currentIndex];
            
            // 日付の表示
            dateDisplay.innerText = formatKanjiDate(entry.date);
            
            // テキストの更新（アニメーションをリセットするために一度消去して再描画）
            marqueeText.style.animation = 'none';
            marqueeText.offsetHeight; // reflow
            marqueeText.innerText = entry.content;
            
            // 内容の長さに応じてスピードを調整（1文字0.3秒程度）
            const duration = Math.max(10, entry.content.length * 0.4);
            marqueeText.style.animation = `vertical-marquee ${duration}s linear infinite`;
        }

        function formatKanjiDate(yyyymmdd) {
            const y = yyyymmdd.substring(0, 4);
            const m = parseInt(yyyymmdd.substring(4, 6));
            const d = parseInt(yyyymmdd.substring(6, 8));
            return `${y}年${m}月${d}日${isFakeMode ? '（裏）' : ''}`;
        }

        // --- イベントハンドラ ---

        document.getElementById('prev-btn').addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderCurrentEntry();
            }
        });

        document.getElementById('next-btn').addEventListener('click', () => {
            if (currentIndex < allEntries.length - 1) {
                currentIndex++;
                renderCurrentEntry();
            }
        });

        document.getElementById('toggle-zone').addEventListener('click', () => {
            isFakeMode = !isFakeMode;
            body.classList.toggle('fake-mode', isFakeMode);
            loadEntries(isFakeMode);
        });

        // 初期読み込み
        loadEntries(isFakeMode);
    </script>
</body>
</html>
