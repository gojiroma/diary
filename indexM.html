<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>誤字ロマの時流 - Gojiroma Timeflow</title>
    <style>
        @font-face {
            font-family: 'gojiromanus';
            src: url('https://nikki.poet.blue/gojiromanus.otf') format('opentype');
            font-display: swap;
        }

        :root {
            --bg-color: #271f2c;
            --text-color: #8fbcf2;
            /* 画面の高さに基づく巨大なフォントサイズ */
            --font-size: 16svh; 
            /* スクロール速度（1ピクセルあたりのミリ秒。小さいほど速い） */
            --scroll-speed: 50; 
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'gojiromanus', serif;
            /* ユーザーによるスクロールを禁止 */
            overflow: hidden; 
            transition: background-color 1s ease;
            -webkit-user-select: none;
            user-select: none;
        }

        /* メインの表示コンテナ */
        #flow-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            writing-mode: vertical-rl;
            text-orientation: upright;
            position: relative;
        }

        /* 現在流れているテキストエレメント */
        .flow-text {
            display: inline-block;
            font-size: var(--font-size);
            line-height: 1.1;
            white-space: nowrap;
            position: absolute;
            /* 初期位置は画面の下 */
            top: 100svh; 
            will-change: transform;
        }

        /* 日付表示（画面上部に固定） */
        #date-overlay {
            position: fixed;
            top: calc(15px + env(safe-area-inset-top, 0px));
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            z-index: 100;
            opacity: 0.5;
            letter-spacing: 0.2em;
            text-align: center;
            width: 100%;
            writing-mode: horizontal-tb;
            transition: opacity 0.5s ease;
        }

        /* 読み込み中などのメッセージ */
        #status-overlay {
            position: fixed;
            bottom: calc(20px + env(safe-area-inset-bottom, 0px));
            left: 50%;
            transform: translateX(-50%);
            font-size: 1rem;
            z-index: 90;
            opacity: 0.3;
            writing-mode: horizontal-tb;
        }

    </style>
</head>
<body>

    <div id="date-overlay"></div>
    <div id="status-overlay"></div>

    <div id="flow-container">
        </div>

    <script>
        const BASE_URL = 'https://nikki.poet.blue/';
        let allEntries = [];
        let currentIndex = 0; // 最新（インデックス0）から開始
        let currentAnimation = null;

        const container = document.getElementById('flow-container');
        const dateOverlay = document.getElementById('date-overlay');
        const statusOverlay = document.getElementById('status-overlay');

        // 漢数字変換
        function toKanjiDate(yyyymmdd) {
            const y = yyyymmdd.substring(0, 4);
            const m = parseInt(yyyymmdd.substring(4, 6));
            const d = parseInt(yyyymmdd.substring(6, 8));
            const kanjiMonths = ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];
            return `${y}年 ${kanjiMonths[m-1]}${d}日`;
        }

        // Markdownパース
        function parseMarkdown(text) {
            // '---' で分割。fetch元が最新順か過去順か不明だが、
            // 日付順にソートする。
            const entries = text.split('---').filter(e => e.trim());
            const parsed = entries.map(entry => {
                const dateMatch = entry.match(/date:\s*(.*)/);
                const contentMatch = entry.match(/content:\s*\|\s*\n([\s\S]*?)(?=\n---|\n$|$)/m);
                return {
                    date: dateMatch ? dateMatch[1].trim() : '00000000',
                    // 改行を全角スペースに変換し、1行にする
                    content: contentMatch ? contentMatch[1].replace(/^\s*\|?\s*/gm, '').replace(/\n/g, '　').trim() : ''
                };
            });

            // 日付の降順（最新が上）にソート
            parsed.sort((a, b) => b.date.localeCompare(a.date));
            return parsed;
        }

        // 初期データの読み込み
        async function initApp() {
            statusOverlay.innerText = "時流を読み込み中...";
            try {
                const response = await fetch(BASE_URL + 'entry.md');
                const text = await response.text();
                allEntries = parseMarkdown(text);
                
                if (allEntries.length > 0) {
                    statusOverlay.innerText = "";
                    startFlow();
                } else {
                    statusOverlay.innerText = "エントリが見つかりません。";
                }
            } catch (e) {
                console.error(e);
                statusOverlay.innerText = "通信エラー";
            }
        }

        // 指定されたインデックスのエントリを流す
        function startFlow() {
            if (currentIndex >= allEntries.length) {
                // すべて読み終わったら最初に戻る（ループ）か、停止するか。
                // ここではループさせる。
                currentIndex = 0; 
            }

            const entry = allEntries[currentIndex];
            
            // 日付表示を更新
            dateOverlay.innerText = toKanjiDate(entry.date);
            dateOverlay.style.opacity = "0.8";

            // 新しいテキストエレメントを作成
            const textEl = document.createElement('div');
            textEl.className = 'flow-text';
            textEl.innerText = entry.content;
            container.appendChild(textEl);

            // アニメーションの設定
            const textHeight = textEl.offsetHeight;
            const windowHeight = window.innerHeight;
            
            // 総移動距離：画面の下端から、テキスト全体が画面上端に消えるまで
            const totalDistance = windowHeight + textHeight;
            
            // 移動にかかる時間（ミリ秒）。速度設定に基づく
            const duration = totalDistance * parseInt(getComputedStyle(document.documentElement).getPropertyValue('--scroll-speed'));

            // Web Animations API を使用
            currentAnimation = textEl.animate([
                // 開始：画面中央付近
                { transform: `translateY(0px)` }, 
                // 終了：画面上方に消える
                { transform: `translateY(-${totalDistance}px)` }
            ], {
                duration: duration,
                easing: 'linear',
                // 開始を画面中央にするために、delayを負の値にする（トリッキーだが有効）
                // これにより、アニメーションが途中の状態から始まる
                delay: -(duration * (windowHeight / 2 / totalDistance)) 
            });

            // アニメーション終了時の処理（次のエントリへ）
            currentAnimation.onfinish = () => {
                // 古いテキストを削除
                textEl.remove();
                // インデックスを進める（過去へ遡る）
                currentIndex++;
                // 次のフローを開始
                startFlow();
            };
            
            // フェードイン用のタイマー
            setTimeout(() => {
                 dateOverlay.style.opacity = "0.3";
            }, 3000);
        }

        // 開始
        initApp();

        // 画面サイズ変更時にアニメーションをリセット
        window.addEventListener('resize', () => {
            if (currentAnimation) {
                currentAnimation.cancel();
                container.innerHTML = ""; // コンテナをクリア
                startFlow(); // 現在のインデックスで再開
            }
        });
        
    </script>
</body>
</html>
