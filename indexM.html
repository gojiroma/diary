<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>誤字ロマの時流 - Gojiroma Timeflow</title>
    <style>
        @font-face {
            font-family: 'gojiromanus';
            src: url('https://nikki.poet.blue/gojiromanus.otf') format('opentype');
            font-display: swap;
        }

        :root {
            --bg-color: #271f2c;
            --text-color: #8fbcf2;
            --font-size: 15svh; 
            /* スクロール速度（数値が小さいほど速い） */
            --scroll-speed: 25; 
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'gojiromanus', serif;
            overflow: hidden; 
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }

        /* メインの表示コンテナ */
        #flow-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            writing-mode: vertical-rl;
            text-orientation: upright;
            position: relative;
        }

        /* 流れるテキスト */
        .flow-text {
            display: inline-block;
            font-size: var(--font-size);
            line-height: 1;
            white-space: nowrap;
            position: absolute;
            will-change: transform;
        }

        /* 右上の日付（縦書き） */
        #date-overlay {
            position: fixed;
            top: calc(20px + env(safe-area-inset-top, 0px));
            right: calc(15px + env(safe-area-inset-right, 0px));
            font-size: 1.3rem;
            z-index: 100;
            opacity: 0.7;
            letter-spacing: 0.3em;
            writing-mode: vertical-rl;
            text-orientation: upright;
            transition: opacity 0.8s ease;
        }

        #status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 0.8rem;
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <div id="date-overlay"></div>
    <div id="status"></div>
    <div id="flow-container"></div>

    <script>
        const BASE_URL = 'https://nikki.poet.blue/';
        let allEntries = [];
        let currentIndex = 0;

        const container = document.getElementById('flow-container');
        const dateOverlay = document.getElementById('date-overlay');

        const KANJI_NUMS = ['〇', '一', '二', '三', '四', '五', '六', '七', '八', '九', '十', '十一', '十二'];

        function toKanjiDate(yyyymmdd) {
            const m = parseInt(yyyymmdd.substring(4, 6));
            const d = parseInt(yyyymmdd.substring(6, 8));
            
            // 日付の漢数字変換（簡易版）
            const dayKanji = d <= 12 ? KANJI_NUMS[d] : d; 
            return `${KANJI_NUMS[m]}月${dayKanji}日`;
        }

        async function init() {
            try {
                const response = await fetch(BASE_URL + 'entry.md');
                const text = await response.text();
                
                const entries = text.split('---').filter(e => e.trim());
                allEntries = entries.map(entry => {
                    const dateMatch = entry.match(/date:\s*(.*)/);
                    const contentMatch = entry.match(/content:\s*\|\s*\n([\s\S]*?)(?=\n---|\n$|$)/m);
                    return {
                        date: dateMatch ? dateMatch[1].trim() : '20240101',
                        content: contentMatch ? contentMatch[1].replace(/^\s*\|?\s*/gm, '').replace(/\n/g, '　').trim() : ''
                    };
                });
                allEntries.sort((a, b) => b.date.localeCompare(a.date));
                
                if (allEntries.length > 0) startFlow();
            } catch (e) {
                document.getElementById('status').innerText = "Load Error";
            }
        }

        function startFlow() {
            if (currentIndex >= allEntries.length) currentIndex = 0;
            const entry = allEntries[currentIndex];
            
            // 日付表示更新
            dateOverlay.style.opacity = "0";
            setTimeout(() => {
                dateOverlay.innerText = toKanjiDate(entry.date);
                dateOverlay.style.opacity = "0.7";
            }, 500);

            const textEl = document.createElement('div');
            textEl.className = 'flow-text';
            textEl.innerText = entry.content;
            container.appendChild(textEl);

            const textHeight = textEl.offsetHeight;
            const windowHeight = window.innerHeight;
            const totalDistance = windowHeight + textHeight;
            const speed = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--scroll-speed'));
            const duration = totalDistance * speed;

            // アニメーション：画面中央(0px)から開始し、上端(-total)へ消える
            const animation = textEl.animate([
                { transform: `translateY(0px)`, opacity: 1 },
                { transform: `translateY(-${totalDistance}px)`, opacity: 1 }
            ], {
                duration: duration,
                easing: 'linear'
            });

            animation.onfinish = () => {
                textEl.remove();
                currentIndex++;
                startFlow();
            };
        }

        init();
    </script>
</body>
</html>
