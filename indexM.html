<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>流</title>
    <style>
        @font-face {
            font-family: 'gojiromanus';
            src: url('https://nikki.poet.blue/gojiromanus.otf') format('opentype');
            font-display: swap;
        }

        :root {
            --bg-color: #271f2c;
            --text-color: #8fbcf2;
            --font-size: 8svh; 
            /* 速度（1px進むのにかかるミリ秒）さらに速く設定 */
            --scroll-speed: 4; 
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'gojiromanus', serif;
            overflow: hidden; 
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #flow-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            writing-mode: vertical-rl;
            text-orientation: upright;
            position: relative;
        }

        .flow-text {
            display: inline-block;
            font-size: var(--font-size);
            line-height: 1;
            white-space: nowrap;
            position: absolute;
            will-change: transform;
            /* 初期位置：画面下端の外 */
            top: 100%; 
        }

        /* 右上の日付：縦書き・完全漢数字 */
        #date-overlay {
            position: fixed;
            top: calc(25px + env(safe-area-inset-top, 0px));
            right: calc(20px + env(safe-area-inset-right, 0px));
            font-size: 1.4rem;
            z-index: 100;
            opacity: 0.8;
            letter-spacing: 0.3em;
            writing-mode: vertical-rl;
            text-orientation: upright;
            pointer-events: none;
            text-shadow: 0 0 10px var(--bg-color);
        }
    </style>
</head>
<body>

    <div id="date-overlay"></div>
    <div id="flow-container"></div>

    <script>
        const BASE_URL = 'https://nikki.poet.blue/';
        let allEntries = [];
        let currentIndex = 0;

        // 数値を正しい漢数字に変換（1〜31対応）
        function convertToKanji(num) {
            const kanjiNums = ['', '一', '二', '三', '四', '五', '六', '七', '八', '九'];
            if (num === 10) return '十';
            if (num < 10) return kanjiNums[num];
            if (num < 20) return '十' + kanjiNums[num % 10];
            const ten = Math.floor(num / 10);
            const one = num % 10;
            return (ten === 1 ? '' : kanjiNums[ten]) + '十' + kanjiNums[one];
        }

        function toKanjiDate(yyyymmdd) {
            const m = parseInt(yyyymmdd.substring(4, 6));
            const d = parseInt(yyyymmdd.substring(6, 8));
            return `${convertToKanji(m)}月${convertToKanji(d)}日`;
        }

        async function init() {
            try {
                const response = await fetch(BASE_URL + 'entry.md');
                const text = await response.text();
                
                const entries = text.split('---').filter(e => e.trim());
                allEntries = entries.map(entry => {
                    const dateMatch = entry.match(/date:\s*(.*)/);
                    const contentMatch = entry.match(/content:\s*\|\s*\n([\s\S]*?)(?=\n---|\n$|$)/m);
                    return {
                        date: dateMatch ? dateMatch[1].trim() : '20240101',
                        content: contentMatch ? contentMatch[1].replace(/^\s*\|?\s*/gm, '').replace(/\n/g, '　').trim() : ''
                    };
                });
                allEntries.sort((a, b) => b.date.localeCompare(a.date));
                
                if (allEntries.length > 0) {
                    spawn();
                }
            } catch (e) {
                console.error("Fetch Error");
            }
        }

        function spawn() {
            if (currentIndex >= allEntries.length) currentIndex = 0;
            const entry = allEntries[currentIndex];
            
            // 日付を更新
            document.getElementById('date-overlay').innerText = toKanjiDate(entry.date);
            
            const textEl = document.createElement('div');
            textEl.className = 'flow-text';
            textEl.innerText = entry.content;
            document.getElementById('flow-container').appendChild(textEl);

            const textHeight = textEl.offsetHeight;
            const windowHeight = window.innerHeight;
            
            // 総移動距離：画面の下(100%)から、テキスト末尾が画面の上(-textHeight)に消えるまで
            const totalDistance = windowHeight + textHeight;
            const speed = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--scroll-speed'));
            const duration = totalDistance * speed;

            // アニメーション実行
            const animation = textEl.animate([
                { transform: `translateY(0px)` },
                { transform: `translateY(-${totalDistance}px)` }
            ], {
                duration: duration,
                easing: 'linear'
            });

            // 重なりを防ぐため、今のテキストの「末尾」が画面に入りきったタイミングで次を出す
            // delay = (今のテキストの全高) * speed
            const nextSpawnDelay = textHeight * speed;

            setTimeout(() => {
                currentIndex++;
                spawn();
            }, nextSpawnDelay);

            // 画面外に消えたら削除
            animation.onfinish = () => textEl.remove();
        }

        init();
    </script>
</body>
</html>
