<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">

    <title>誤字ロマの日記</title>
    <link rel="icon" href="diary-icon.png" type="image/png">
    <link rel="preload" href="gojiromanus.otf" as="font" type="font/otf" crossorigin>
    
    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        @font-face {
            font-family: 'gojiromanus';
            src: url('gojiromanus.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: block;
        }

        * {
            font-family: 'gojiromanus', serif;
        }

        :root {
            --bg-color: #0a0a0a;
            --text-color: #8fbcf2;
            --accent-color: #ff6b9d;
            --transition: 0.3s ease;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            opacity: 0;
            transition: opacity var(--transition);
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        body.fake-mode {
            --bg-color: #0f0f0a;
            --text-color: #a7be80;
            --accent-color: #7fba00;
        }

        body.loaded {
            opacity: 1;
        }

        #webgl-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* ヘッダー */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            pointer-events: none;
            z-index: 1000;
        }

        .title {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--accent-color);
            letter-spacing: 0.1em;
            pointer-events: all;
        }

        .mode-toggle {
            width: 55px;
            height: 55px;
            background: rgba(143, 188, 242, 0.1);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.4rem;
            border-radius: 50%;
            cursor: pointer;
            user-select: none;
            z-index: 1000;
            opacity: 0.6;
            transition: all 0.3s;
            pointer-events: all;
            border: 2px solid rgba(143, 188, 242, 0.2);
            backdrop-filter: blur(10px);
        }

        .mode-toggle:hover {
            opacity: 1;
            background: rgba(143, 188, 242, 0.2);
            transform: rotate(180deg);
        }

        /* フッター */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            pointer-events: none;
            z-index: 1000;
        }

        .info-panel {
            background: rgba(0, 0, 0, 0.6);
            color: var(--text-color);
            padding: 18px 22px;
            border-radius: 12px;
            font-size: 0.95rem;
            pointer-events: all;
            max-width: 400px;
            text-align: left;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(143, 188, 242, 0.15);
        }

        .date-info {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 1.05rem;
            color: var(--accent-color);
            letter-spacing: 0.05em;
        }

        .stats-info {
            font-size: 0.85rem;
            opacity: 0.8;
            line-height: 1.5;
        }

        .stats-info div {
            margin: 3px 0;
        }

        .nav-area {
            display: flex;
            gap: 20px;
            pointer-events: all;
        }

        .nav-button {
            width: 65px;
            height: 65px;
            background: rgba(143, 188, 242, 0.1);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            border-radius: 50%;
            cursor: pointer;
            user-select: none;
            z-index: 1000;
            opacity: 0.6;
            transition: all 0.3s;
            border: 2px solid rgba(143, 188, 242, 0.2);
            backdrop-filter: blur(10px);
            flex-direction: column;
        }

        .nav-button:hover {
            opacity: 1;
            background: rgba(143, 188, 242, 0.2);
            transform: scale(1.1);
        }

        .nav-button:active {
            transform: scale(0.95);
        }

        .nav-label {
            font-size: 0.65rem;
            margin-top: 2px;
            opacity: 0.7;
        }

        /* モバイル対応 */
        @media (max-width: 1024px) {
            .header {
                height: 65px;
                padding: 12px 20px;
            }

            .title {
                font-size: 1.2rem;
            }

            .mode-toggle {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }

            .footer {
                height: 95px;
                padding: 15px 20px;
            }

            .info-panel {
                padding: 15px 18px;
                font-size: 0.9rem;
                max-width: 350px;
            }

            .date-info {
                font-size: 1rem;
                margin-bottom: 6px;
            }

            .nav-button {
                width: 60px;
                height: 60px;
                font-size: 1.6rem;
            }

            .nav-label {
                font-size: 0.6rem;
            }
        }

        @media (max-width: 768px) {
            .header {
                height: 60px;
                padding: 10px 15px;
            }

            .title {
                font-size: 1.1rem;
            }

            .mode-toggle {
                width: 48px;
                height: 48px;
                font-size: 1.1rem;
            }

            .footer {
                height: 90px;
                padding: 12px 15px;
            }

            .info-panel {
                padding: 12px 15px;
                font-size: 0.85rem;
                max-width: 300px;
            }

            .date-info {
                font-size: 0.95rem;
                margin-bottom: 5px;
            }

            .stats-info {
                font-size: 0.8rem;
                line-height: 1.4;
            }

            .nav-area {
                gap: 15px;
            }

            .nav-button {
                width: 55px;
                height: 55px;
                font-size: 1.4rem;
            }

            .nav-label {
                font-size: 0.55rem;
            }
        }

        @media (max-width: 480px) {
            .header {
                height: 55px;
                padding: 8px 12px;
            }

            .title {
                font-size: 1rem;
            }

            .mode-toggle {
                width: 45px;
                height: 45px;
                font-size: 1rem;
            }

            .footer {
                height: 85px;
                padding: 10px 12px;
            }

            .info-panel {
                padding: 10px 12px;
                font-size: 0.8rem;
                max-width: 280px;
            }

            .date-info {
                font-size: 0.9rem;
                margin-bottom: 4px;
            }

            .stats-info {
                font-size: 0.75rem;
                line-height: 1.3;
            }

            .nav-area {
                gap: 12px;
            }

            .nav-button {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }

            .nav-label {
                font-size: 0.5rem;
            }
        }

        /* スクロールヒント */
        .scroll-hint {
            position: fixed;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: rgba(143, 188, 242, 0.3);
            pointer-events: none;
            z-index: 500;
            text-align: center;
        }
    </style>
</head>

<body>
    <div id="webgl-container"></div>

    <div class="ui-overlay">
        <div class="header">
            <div class="title">誤字ロマの日記</div>
            <div class="mode-toggle" id="modeToggle" title="モード切り替え (スペースキー)">🌙</div>
        </div>

        <div class="footer">
            <div class="info-panel" id="infoPanel">
                <div class="date-info" id="dateInfo">日記を選択してください</div>
                <div class="stats-info" id="statsInfo"></div>
            </div>
            <div class="nav-area">
                <div class="nav-button" id="navPrev" title="前の日記">
                    <span>◀</span>
                    <span class="nav-label">前</span>
                </div>
                <div class="nav-button" id="navNext" title="次の日記">
                    <span>▶</span>
                    <span class="nav-label">次</span>
                </div>
            </div>
        </div>
    </div>

    <div class="scroll-hint">スクロール / ↑↓ キーで読み進める</div>

    <script src="webgl-scroll-engine.js"></script>
    <script>
        class DiaryUtils {
            static toKanjiNumber(num) {
                const kanjiNumbers = ['〇', '一', '二', '三', '四', '五', '六', '七', '八', '九'];
                return num.toString().split('').map(digit => kanjiNumbers[digit]).join('');
            }

            static toKanjiMonth(month) {
                const kanjiMonths = ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];
                return kanjiMonths[month - 1];
            }

            static toKanjiDay(day) {
                const days = ['', '一', '二', '三', '四', '五', '六', '七', '八', '九', '十', '十一', '十二', '十三', '十四', '十五', '十六', '十七', '十八', '十九', '二十', '二十一', '二十二', '二十三', '二十四', '二十五', '二十六', '二十七', '二十八', '二十九', '三十', '三十一'];
                return days[day];
            }

            static toJapaneseEra(year) {
                const eras = [
                    { name: '令和', start: 2019, offset: 2018 },
                    { name: '平成', start: 1989, offset: 1988 },
                    { name: '昭和', start: 1926, offset: 1925 },
                    { name: '大正', start: 1912, offset: 1911 },
                    { name: '明治', start: 1868, offset: 1867 }
                ];
                const era = eras.find(e => year >= e.start);
                const eraYear = year - era.offset;
                return `${era.name}${this.toKanjiNumber(eraYear)}年`;
            }

            static formatJapaneseDate(yyyymmdd) {
                const year = parseInt(yyyymmdd.substring(0, 4), 10);
                const month = parseInt(yyyymmdd.substring(4, 6), 10);
                const day = parseInt(yyyymmdd.substring(6, 8), 10);
                const date = new Date(year, month - 1, day);
                const dayOfWeek = ['日', '月', '火', '水', '木', '金', '土'][date.getDay()];
                return {
                    short: `${this.toKanjiMonth(month)}${this.toKanjiDay(day)}日　${DiaryApp.isFakeMode ? '裏日記' : dayOfWeek + "曜日"}`,
                    long: `${this.toJapaneseEra(year)}${this.toKanjiMonth(month)}${this.toKanjiDay(day)}日（${DiaryApp.isFakeMode ? '裏' : dayOfWeek}）`
                };
            }
        }

        class DiaryApp {
            static isFakeMode = false;
            static fakeEntriesCache = null;
            static diaryEntries = [];
            static weatherData = [];
            static renderer = null;
            static currentEntry = null;

            static async init() {
                // WebGL初期化
                const container = document.getElementById('webgl-container');
                this.renderer = new ScrollTypographyEngine(container, {
                    textColor: 0x8fbcf2,
                    backgroundColor: 0x0a0a0a
                });

                // データ読み込み
                await this.loadWeatherData();
                await this.loadDiaryEntries();
                this.preloadFakeEntries();
                this.setupEventListeners();
                this.updateThemeColor(!this.isFakeMode);

                await document.fonts.ready;
                document.body.classList.add('loaded');

                this.setupNavButtons();
                this.setupModeToggle();
                this.scrollToEntryFromHash();
            }

            static updateThemeColor(isLight) {
                const metaThemeColor = document.querySelector('meta[name="theme-color"]');
                if (!metaThemeColor) return;

                const bgColor = isLight ? '#0a0a0a' : '#0f0f0a';
                metaThemeColor.setAttribute('content', bgColor);
            }

            static async loadWeatherData() {
                try {
                    const response = await fetch('weather.csv');
                    if (!response.ok) return;
                    const text = await response.text();
                    const lines = text.split('\n').filter(line => line.trim());
                    this.weatherData = lines.slice(1).map(line => {
                        const [date, avgTemp, avgWind] = line.split(',').map(v => v.trim());
                        return { date, avgTemp: parseFloat(avgTemp), avgWind: parseFloat(avgWind) };
                    });
                } catch (error) {
                    console.error('Error loading weather data:', error);
                }
            }

            static async loadDiaryEntries(filename = 'entry.md') {
                try {
                    const response = await fetch(filename);
                    if (!response.ok) throw new Error(`Failed to load ${filename}: ${response.status}`);
                    const text = await response.text();
                    this.renderEntries(text);
                } catch (error) {
                    console.error(`Error loading ${filename}:`, error);
                }
            }

            static renderEntries(text) {
                this.diaryEntries = [];
                const entries = text.split('---').filter(entry => entry.trim());
                entries.reverse().forEach(entry => {
                    const dateMatch = entry.match(/date:\s*(.*)/);
                    const contentMatch = entry.match(/content:\s*\|\s*\n([\s\S]*?)(?=\n---|\n$|$)/m);
                    if (!dateMatch || !contentMatch) return;

                    const yyyymmdd = dateMatch[1].trim();
                    const dateObj = DiaryUtils.formatJapaneseDate(yyyymmdd);
                    const contentLines = contentMatch[1].split('\n').map(line => line.replace(/^\s*\|?\s*/, '')).join('\n');
                    const dateForIcons = `${yyyymmdd.substring(0, 4)}/${yyyymmdd.substring(4, 6)}/${yyyymmdd.substring(6, 8)}`;

                    const charCount = contentLines.replace(/\s+/g, '').length;
                    const weather = this.weatherData ? this.weatherData.find(w => w.date === dateForIcons) : null;
                    const tempInfo = weather ? `${weather.avgTemp}°C` : '-';
                    const windInfo = weather ? `${weather.avgWind}m/s` : '-';

                    this.diaryEntries.push({
                        yyyymmdd,
                        dateObj,
                        content: contentLines.trim(),
                        charCount,
                        tempInfo,
                        windInfo,
                        weather
                    });
                });
            }

            static setupEventListeners() {
                document.addEventListener('keydown', e => this.handleKeyDown(e));
                window.addEventListener('hashchange', () => this.scrollToEntryFromHash());
                window.addEventListener('load', () => this.scrollToEntryFromHash());
            }

            static handleKeyDown(e) {
                if (e.key === ' ') {
                    e.preventDefault();
                    this.toggleFakeMode();
                    return;
                }

                const currentIndex = this.diaryEntries.findIndex(entry => entry.yyyymmdd === this.currentEntry?.yyyymmdd);
                if (currentIndex === -1) return;

                if (e.key === 'ArrowLeft') {
                    const nextEntry = this.diaryEntries[currentIndex + 1];
                    if (nextEntry) window.location.hash = nextEntry.yyyymmdd;
                } else if (e.key === 'ArrowRight') {
                    const prevEntry = this.diaryEntries[currentIndex - 1];
                    if (prevEntry) window.location.hash = prevEntry.yyyymmdd;
                }
            }

            static setupNavButtons() {
                document.getElementById('navPrev').addEventListener('click', () => {
                    if (!this.currentEntry) return;
                    const currentIndex = this.diaryEntries.findIndex(entry => entry.yyyymmdd === this.currentEntry.yyyymmdd);
                    if (currentIndex < this.diaryEntries.length - 1) {
                        window.location.hash = this.diaryEntries[currentIndex + 1].yyyymmdd;
                    }
                });

                document.getElementById('navNext').addEventListener('click', () => {
                    if (!this.currentEntry) return;
                    const currentIndex = this.diaryEntries.findIndex(entry => entry.yyyymmdd === this.currentEntry.yyyymmdd);
                    if (currentIndex > 0) {
                        window.location.hash = this.diaryEntries[currentIndex - 1].yyyymmdd;
                    }
                });
            }

            static setupModeToggle() {
                document.getElementById('modeToggle').addEventListener('click', () => {
                    this.toggleFakeMode();
                });
            }

            static scrollToEntryFromHash() {
                const hash = window.location.hash.substring(1);
                let entry = null;

                if (hash && hash.match(/^\d{8}$/)) {
                    entry = this.diaryEntries.find(e => e.yyyymmdd === hash);
                }

                if (!entry && this.diaryEntries.length > 0) {
                    entry = this.diaryEntries[0];
                }

                if (entry) {
                    this.currentEntry = entry;
                    this.displayEntry(entry);
                    this.updateInfoPanel(entry);
                }
            }

            static displayEntry(entry) {
                if (this.renderer) {
                    this.renderer.renderText(entry.content);

                    // 天気に基づいて色を変更
                    if (entry.weather) {
                        const temp = entry.weather.avgTemp;
                        const red = Math.min(255, Math.floor((temp + 10) * 10));
                        const blue = Math.min(255, Math.floor((35 - temp) * 10));
                        const hex = ((red << 16) | (50 << 8) | blue).toString(16).padStart(6, '0');
                        this.renderer.setTextColor('#' + hex);
                    }
                }
            }

            static updateInfoPanel(entry) {
                const dateInfo = document.getElementById('dateInfo');
                const statsInfo = document.getElementById('statsInfo');

                dateInfo.textContent = entry.dateObj.long;
                statsInfo.innerHTML = `
                    <div>🌡️ ${entry.tempInfo}</div>
                    <div>💨 ${entry.windInfo}</div>
                    <div>📝 ${entry.charCount}文字</div>
                `;
            }

            static toggleFakeMode() {
                this.isFakeMode = !this.isFakeMode;
                const body = document.body;
                const modeToggle = document.getElementById('modeToggle');

                this.updateThemeColor(!this.isFakeMode);
                body.classList.toggle('fake-mode', this.isFakeMode);
                modeToggle.textContent = this.isFakeMode ? '☀️' : '🌙';

                const bgColor = this.isFakeMode ? 0x0f0f0a : 0x0a0a0a;
                const textColor = this.isFakeMode ? 0xa7be80 : 0x8fbcf2;

                if (this.renderer) {
                    this.renderer.setBackgroundColor(bgColor);
                    this.renderer.setTextColor(textColor);
                }

                if (this.isFakeMode) {
                    if (this.fakeEntriesCache) {
                        this.renderEntries(this.fakeEntriesCache);
                    } else {
                        this.loadDiaryEntries('fake.md');
                    }
                } else {
                    this.loadDiaryEntries('entry.md');
                }

                this.scrollToEntryFromHash();
            }

            static async preloadFakeEntries() {
                try {
                    const response = await fetch('fake.md');
                    if (response.ok) this.fakeEntriesCache = await response.text();
                } catch (error) {
                    console.error('Error preloading fake entries:', error);
                }
            }
        }

        // 初期化
        DiaryApp.init();
    </script>
</body>

</html>
