<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">

    <title>誤字ロマの日記</title>
    <link rel="icon" href="diary-icon.png" type="image/png">
    <style>
        @font-face {
            font-family: 'gojiromanus';
            src: url('gojiromanus.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --bg-color: #ffffffa0;
            --text-color: #333333;
            --border-color: #666666;
            --timeline-color: #666666;
            --highlight-color: #cccccc;
            --icon-size: 40px;
            --transition: 0.2s ease;
            --light-pastel-1: #f8e8e8;
            --light-pastel-2: #e8f8f5;
            --dark-pastel-1: #2a2a3a;
            --dark-pastel-2: #1a1a2a;
        }

        body {
            overflow: hidden;
            font-family: "gojiromanus";
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100svh;
            margin: 0;
            padding: 0;
            position: relative;
            opacity: 0;
            transition: opacity var(--transition), background-color var(--transition);
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        body.fake-mode {
            --bg-color: #000000;
            --text-color: #e0e0e0;
        }

        .diary-container-wrapper {
            width: 100%;
            max-width: 90%;
            height: 85vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            box-sizing: border-box;
            margin-top: 20px;
            transition: background-color var(--transition);
        }

        .diary-container {
            overflow: hidden;
            display: flex;
            flex-direction: row;
            gap: 20px;
            width: 100%;
            height: 100%;
            padding: 0;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .diary-container::-webkit-scrollbar {
            display: none;
        }

        .diary-entry {
            writing-mode: vertical-rl;
            text-orientation: upright;
            line-height: 2;
            letter-spacing: 0.1em;
            width: auto;
            white-space: normal;
            overflow: visible;
            scroll-margin-top: 50px;
            padding: 0 10px;
            transition: all 0.3s ease;
            flex-shrink: 0;
            text-wrap: balance;
            overflow-wrap: break-word;
            background-color: transparent;
            position: relative;
        }

        .date-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            margin: 0 20px;
            flex-wrap: wrap;
            gap: 5px;
        }

        .date {
            cursor: pointer;
            font-size: 1.6em;
            white-space: nowrap;
            position: relative;
            transition: all 0.3s ease;
        }

        .date.fake-mode {
            color: var(--text-color);
        }

        .days-ago {
            cursor: default;
            font-size: 1.6em;
            margin-left: -3px;
            white-space: nowrap;
            opacity: 0.6;
            writing-mode: vertical-rl;
        }

        .content {
            font-size: 1.3em;
            white-space: pre-line;
            text-wrap: balance;
            overflow-wrap: break-word;
            position: relative;
        }

        .diary-entry:not(.active) {
            opacity: 0.6;
        }

        .diary-entry.active {
            opacity: 1;
        }

        .highlight {
            background-color: var(--highlight-color);
            font-weight: bold;
            padding: 0 2px;
            border-radius: 2px;
            margin: 0 -2px;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60%,
            80% {
                transform: translateX(-2px);
            }

            40% {
                transform: translateX(2px);
            }
        }

        .date:hover {
            animation: shake 0.3s infinite;
        }

        .falling {
            will-change: transform, opacity;
            backface-visibility: hidden;
            perspective: 1000px;
        }

        .char.falling,
        .date.falling {
            position: fixed;
            transition: transform 2s ease-in, opacity 2s ease-out;
            will-change: transform, opacity;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="diary-container-wrapper">
        <div class="diary-container" id="diaryContainer"></div>
    </div>

    <script>
        class DiaryUtils {
            static toKanjiNumber(num) {
                const kanjiNumbers = ['〇', '一', '二', '三', '四', '五', '六', '七', '八', '九'];
                return num.toString().split('').map(digit => kanjiNumbers[digit]).join('');
            }

            static toKanjiMonth(month) {
                const kanjiMonths = ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];
                return kanjiMonths[month - 1];
            }

            static toKanjiDay(day) {
                const days = ['', '一', '二', '三', '四', '五', '六', '七', '八', '九', '十', '十一', '十二', '十三', '十四', '十五', '十六', '十七', '十八', '十九', '二十', '二十一', '二十二', '二十三', '二十四', '二十五', '二十六', '二十七', '二十八', '二十九', '三十', '三十一'];
                return days[day];
            }

            static toJapaneseEra(year) {
                const eras = [
                    { name: '令和', start: 2019, offset: 2018 },
                    { name: '平成', start: 1989, offset: 1988 },
                    { name: '昭和', start: 1926, offset: 1925 },
                    { name: '大正', start: 1912, offset: 1911 },
                    { name: '明治', start: 1868, offset: 1867 }
                ];
                const era = eras.find(e => year >= e.start);
                const eraYear = year - era.offset;
                return `${era.name}${this.toKanjiNumber(eraYear)}年`;
            }

            static formatJapaneseDate(yyyymmdd) {
                const year = parseInt(yyyymmdd.substring(0, 4), 10);
                const month = parseInt(yyyymmdd.substring(4, 6), 10);
                const day = parseInt(yyyymmdd.substring(6, 8), 10);
                const date = new Date(year, month - 1, day);
                const dayOfWeek = ['日', '月', '火', '水', '木', '金', '土'][date.getDay()];
                return {
                    short: `${this.toKanjiMonth(month)}${this.toKanjiDay(day)}日（${dayOfWeek}）`,
                    long: `${this.toJapaneseEra(year)}${this.toKanjiMonth(month)}${this.toKanjiDay(day)}日（${dayOfWeek}）`
                };
            }

            static calculateDaysAgo(yyyymmdd) {
                const entryDate = new Date(
                    parseInt(yyyymmdd.substring(0, 4), 10),
                    parseInt(yyyymmdd.substring(4, 6), 10) - 1,
                    parseInt(yyyymmdd.substring(6, 8), 10)
                );
                const today = new Date();
                const diffTime = today - entryDate;
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                return diffDays === 0 ? '今日' : `${diffDays}日前`;
            }
        }

        class DiaryApp {
            static isFakeMode = false;
            static originalEntriesOrder = [];
            static fakeEntriesCache = null;
            static diaryEntries = [];
            static weatherData = [];

            static async init() {
                await this.loadWeatherData();
                await this.loadDiaryEntries();
                this.preloadFakeEntries();
                this.setupDateClick();
                this.setupContentClick();
                this.updatePageTitle(this.diaryEntries.length);
                document.body.style.opacity = 1;
                setTimeout(startFallingAnimation, 180000);
            }

            static parseCSV(csv) {
                const lines = csv.split('\n').filter(line => line.trim());
                return lines.slice(1).map(line => {
                    const [date, avgTemp, , , avgWind] = line.split(',').map(v => v.trim());
                    const normalizedDate = date.replace(/(\d+)\/(\d+)\/(\d+)/, (_, y, m, d) =>
                        `${y}/${m.padStart(2, '0')}/${d.padStart(2, '0')}`
                    );
                    return {
                        date: normalizedDate,
                        avgTemp: parseFloat(avgTemp),
                        avgWind: parseFloat(avgWind)
                    };
                });
            }

            static async loadWeatherData() {
                try {
                    const response = await fetch('data.csv');
                    if (!response.ok) throw new Error(`Failed to load data.csv: ${response.status}`);
                    const csv = await response.text();
                    this.weatherData = this.parseCSV(csv);
                } catch (error) {
                    console.error('Error loading data.csv:', error);
                    this.weatherData = [];
                }
            }

            static getWeatherForDate(dateStr) {
                return this.weatherData.find(w => w.date === dateStr) || { avgTemp: 15, avgWind: 3 };
            }

            static async loadDiaryEntries(filename = 'entry.md') {
                try {
                    const response = await fetch(filename);
                    if (!response.ok) throw new Error(`Failed to load ${filename}: ${response.status}`);
                    const text = await response.text();
                    this.renderEntries(text);
                } catch (error) {
                    console.error(`Error loading ${filename}:`, error);
                }
            }

            static renderEntries(text) {
                const container = document.getElementById('diaryContainer');
                if (!container) {
                    console.error("コンテナが見つかりません。");
                    return;
                }
                container.innerHTML = '';
                this.diaryEntries = [];

                const entries = text.split('---').filter(entry => entry.trim());
                entries.reverse().forEach(entry => {
                    const dateMatch = entry.match(/date:\s*(.*)/);
                    const contentMatch = entry.match(/content:\s*\|\s*\n([\s\S]*?)(?=\n---|\n$|$)/m);
                    if (!dateMatch || !contentMatch) return;

                    const yyyymmdd = dateMatch[1].trim();
                    const dateObj = DiaryUtils.formatJapaneseDate(yyyymmdd);
                    const contentLines = contentMatch[1].split('\n').map(line => line.replace(/^\s*\|?\s*/, '')).join('\n');
                    const dateForWeather = `${yyyymmdd.substring(0, 4)}/${yyyymmdd.substring(4, 6)}/${yyyymmdd.substring(6, 8)}`;
                    const weather = this.getWeatherForDate(dateForWeather);

                    const entryElement = document.createElement('div');
                    entryElement.className = 'diary-entry';
                    entryElement.id = yyyymmdd;

                    const tempColor = this.getTempColor(weather.avgTemp);
                    entryElement.style.setProperty('--temp-color', tempColor);

                    entryElement.innerHTML = `
                        <div class="date-container">
                            <div class="date" data-yyyymmdd="${yyyymmdd}" style="color: var(--temp-color)">${dateObj.short}</div>
                            <div class="days-ago">${DiaryUtils.calculateDaysAgo(yyyymmdd)}</div>
                        </div>
                        <div class="content" style="color: var(--temp-color)">${contentLines}</div>
                    `;
                    container.appendChild(entryElement);

                    this.diaryEntries.push({
                        yyyymmdd,
                        content: contentLines.trim()
                    });
                });

                this.setupDateClick();
                this.scrollToEntryFromHash();
            }

            static getTempColor(temp) {
                const minTemp = -5;
                const maxTemp = 30;
                const minHue = 240;
                const maxHue = 0;
                const hue = minHue + ((temp - minTemp) / (maxTemp - minTemp)) * (maxHue - minHue);
                return `hsl(${hue}, 80%, ${this.isFakeMode ? 50 : 40}%)`;
            }

            static setupDateClick() {
                document.querySelectorAll('.date').forEach(dateElement => {
                    const yyyymmdd = dateElement.getAttribute('data-yyyymmdd');
                    const dateForWeather = `${yyyymmdd.substring(0, 4)}/${yyyymmdd.substring(4, 6)}/${yyyymmdd.substring(6, 8)}`;
                    const weather = this.getWeatherForDate(dateForWeather);

                    dateElement.addEventListener('click', () => {
                        this.isFakeMode = !this.isFakeMode;
                        document.body.classList.toggle('fake-mode', this.isFakeMode);
                        this.renderEntries(this.isFakeMode ? this.fakeEntriesCache || 'fake.md' : 'entry.md');
                        this.updatePageTitle(this.diaryEntries.length);
                    });
                });
            }

            static setupContentClick() {
                document.querySelectorAll('.content').forEach(content => {
                    let speechSynthesisUtterance = null;
                    let isCopied = false;
                    let isFontToggled = false;

                    content.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (speechSynthesisUtterance) {
                            window.speechSynthesis.cancel();
                            speechSynthesisUtterance = null;
                            isCopied = false;
                            return;
                        }
                        if (!isCopied) {
                            const text = content.textContent;
                            navigator.clipboard.writeText(text).then(() => {
                                isCopied = true;
                                setTimeout(() => { isCopied = false; }, 2000);
                            });
                            isFontToggled = !isFontToggled;
                            content.classList.toggle('toggle-font', isFontToggled);
                        }
                    });

                    content.addEventListener('dblclick', (e) => {
                        e.stopPropagation();
                        if (speechSynthesisUtterance) {
                            window.speechSynthesis.cancel();
                            speechSynthesisUtterance = null;
                        } else {
                            const text = content.textContent;
                            speechSynthesisUtterance = new SpeechSynthesisUtterance(text);
                            speechSynthesisUtterance.onend = () => {
                                speechSynthesisUtterance = null;
                            };
                            window.speechSynthesis.speak(speechSynthesisUtterance);
                        }
                    });
                });
            }

            static updatePageTitle(count) {
                document.title = `誤字ロマの${count}日間`;
            }

            static scrollToEntryFromHash() {
                const hash = window.location.hash.substring(1);
                const entries = document.querySelectorAll('.diary-entry');

                entries.forEach(entry => entry.classList.remove('active'));

                if (hash && hash.match(/^\d{8}$/)) {
                    const entry = document.getElementById(hash);
                    if (entry) {
                        entry.classList.add('active');
                        const entryRight = entry.offsetLeft + entry.clientWidth;
                        const containerWidth = document.getElementById('diaryContainer').clientWidth;
                        this.scrollTo(document.getElementById('diaryContainer'), entryRight - containerWidth);
                    }
                } else if (entries.length > 0) {
                    const latestEntry = entries[0];
                    latestEntry.classList.add('active');
                    const entryRight = latestEntry.offsetLeft + latestEntry.clientWidth;
                    const containerWidth = document.getElementById('diaryContainer').clientWidth;
                    this.scrollTo(document.getElementById('diaryContainer'), entryRight - containerWidth);
                }
            }

            static scrollTo(element, targetPosition) {
                element.scrollLeft = targetPosition;
            }

            static async preloadFakeEntries() {
                try {
                    const response = await fetch('fake.md');
                    if (response.ok) this.fakeEntriesCache = await response.text();
                } catch (error) {
                    console.error('Error preloading fake entries:', error);
                }
            }
        }

        DiaryApp.init();
        document.addEventListener('keydown', function (event) {
            if ((event.key === 'i' || event.key === 'I')) {
                if (!['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) {
                    event.preventDefault();
                    window.location.href = 'write.html';
                }
            }
        });

        const wrapCharsForFalling = () => {
            document.querySelectorAll('.content').forEach(content => {
                const text = content.textContent;
                let wrapped = '';
                for (let i = 0; i < text.length; i++) {
                    wrapped += `<span class="char">${text[i]}</span>`;
                }
                content.innerHTML = wrapped;
            });
        };

        const startFallingAnimation = () => {
            wrapCharsForFalling();
            const chars = document.querySelectorAll('.char');
            const dates = document.querySelectorAll('.date');
            const icons = document.querySelectorAll('.icon');
            const btns = document.querySelectorAll('.btn');
            const daysagos = document.querySelectorAll('.days-ago');

            const animateFalling = (element, rect) => {
                const delay = Math.random() * 1000;
                const randomXOffset = (Math.random() - 0.5) * window.innerWidth * 0.6;
                const randomYOffset = Math.random() * -window.innerHeight * 0.89;
                const startTop = window.innerHeight + randomYOffset;
                const startLeft = rect.left + randomXOffset;
                const angle = (Math.random() * 63) - 34;

                const duration = 1 + Math.random() * 100;
                const landingPosition = window.innerHeight * 0.9 + Math.random() * 1200;

                setTimeout(() => {
                    element.style.position = 'fixed';
                    element.style.left = `${startLeft}px`;
                    element.style.top = `${startTop}px`;
                    element.style.transform = `rotate(${angle}deg)`;
                    element.style.opacity = Math.random() * 0.5 + 0.5;
                    const r = Math.floor(Math.random() * 256);
                    const g = Math.floor(Math.random() * 256);
                    const b = Math.floor(Math.random() * 256);
                    element.style.color = `rgb(${r}, ${g}, ${b})`;
                    const minSize = 12;
                    const maxSize = 60;
                    const randomSize = Math.floor(Math.random() * (maxSize - minSize + 1)) + minSize;
                    element.style.fontSize = `${randomSize}px`;
                    element.style.willChange = 'transform, opacity';
                    element.classList.add('falling');

                    setTimeout(() => {
                        element.style.transition = `transform ${duration}s cubic-bezier(0.4, 0, 0.2, 1)`;
                        element.style.transform = `rotate(${angle + (Math.random() * 20 - 10)}deg) translateY(${landingPosition - startTop}px)`;
                    }, 10);
                }, delay);
            };
            [chars, dates, icons, daysagos, btns].forEach(elements => {
                elements.forEach(element => {
                    const rect = element.getBoundingClientRect();
                    animateFalling(element, rect);
                });
            });
        };
    </script>
</body>

</html>
