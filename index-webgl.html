<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#271f2c">

    <title>誤字ロマの日記</title>
    <link rel="icon" href="diary-icon.png" type="image/png">
    <link rel="preload" href="gojiromanus.otf" as="font" type="font/otf" crossorigin>
    
    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        @font-face {
            font-family: 'gojiromanus';
            src: url('gojiromanus.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: block;
        }

        * {
            font-family: 'gojiromanus', serif;
        }

        :root {
            --bg-color: #271f2c;
            --text-color: #8fbcf2;
            --border-color: #666666;
            --transition: 0.3s ease;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            opacity: 0;
            transition: opacity var(--transition), background-color var(--transition);
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        body.fake-mode {
            --bg-color: #19100d;
            --text-color: #a7be80;
        }

        body.loaded {
            opacity: 1;
        }

        #webgl-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .search-input {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 13rem;
            padding: 10px 16px;
            border-radius: 25px;
            border: 1px solid transparent;
            background-color: rgba(39, 31, 44, 0.8);
            color: var(--text-color);
            font-size: 1.1rem;
            text-align: center;
            opacity: 0.7;
            transition: opacity 0.3s, width 0.3s, background-color 0.3s;
            z-index: 1000;
            outline: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            pointer-events: all;
        }

        .search-input:focus,
        .search-input:hover {
            opacity: 1;
            width: 22rem;
            border: 1px solid var(--border-color);
            background-color: rgba(39, 31, 44, 0.95);
        }

        .search-input::placeholder {
            color: var(--border-color);
        }

        .info-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: var(--text-color);
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            z-index: 1000;
            pointer-events: all;
            max-width: 280px;
            text-align: left;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(143, 188, 242, 0.2);
        }

        .info-panel.hidden {
            display: none;
        }

        .date-info {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 1rem;
            color: #ffeb3b;
        }

        .stats-info {
            font-size: 0.85rem;
            opacity: 0.85;
            line-height: 1.5;
        }

        .stats-info div {
            margin: 2px 0;
        }

        .nav-button {
            position: fixed;
            bottom: 20px;
            width: 50px;
            height: 50px;
            background: rgba(143, 188, 242, 0.2);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            border-radius: 50%;
            cursor: pointer;
            user-select: none;
            z-index: 1000;
            opacity: 0.5;
            transition: all 0.3s;
            pointer-events: all;
            border: 2px solid rgba(143, 188, 242, 0.3);
            backdrop-filter: blur(10px);
        }

        .nav-button:hover {
            opacity: 1;
            background: rgba(143, 188, 242, 0.4);
            transform: scale(1.1);
        }

        .nav-button:active {
            transform: scale(0.95);
        }

        .nav-left {
            left: 20px;
        }

        .nav-right {
            right: 20px;
        }

        .mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(143, 188, 242, 0.2);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.3rem;
            border-radius: 50%;
            cursor: pointer;
            user-select: none;
            z-index: 1000;
            opacity: 0.5;
            transition: all 0.3s;
            pointer-events: all;
            border: 2px solid rgba(143, 188, 242, 0.3);
            backdrop-filter: blur(10px);
        }

        .mode-toggle:hover {
            opacity: 1;
            background: rgba(143, 188, 242, 0.4);
            transform: rotate(180deg);
        }

        /* モバイル対応 */
        @media (max-width: 768px) {
            .search-input {
                width: 80%;
                font-size: 1rem;
                padding: 8px 12px;
            }

            .search-input:focus,
            .search-input:hover {
                width: 90%;
            }

            .info-panel {
                bottom: 80px;
                left: 10px;
                right: 10px;
                max-width: none;
                width: auto;
                padding: 12px 15px;
                font-size: 0.85rem;
            }

            .date-info {
                font-size: 0.95rem;
                margin-bottom: 6px;
            }

            .stats-info {
                font-size: 0.8rem;
            }

            .nav-button {
                width: 45px;
                height: 45px;
                font-size: 1.2rem;
                bottom: 15px;
            }

            .nav-left {
                left: 15px;
            }

            .nav-right {
                right: 15px;
            }

            .mode-toggle {
                width: 45px;
                height: 45px;
                font-size: 1.1rem;
                top: 15px;
                right: 15px;
            }
        }

        @media (max-width: 480px) {
            .info-panel {
                bottom: 70px;
                left: 5px;
                right: 5px;
                padding: 10px 12px;
                font-size: 0.8rem;
            }

            .date-info {
                font-size: 0.9rem;
            }

            .stats-info {
                font-size: 0.75rem;
                line-height: 1.3;
            }

            .nav-button {
                width: 40px;
                height: 40px;
                font-size: 1rem;
                bottom: 10px;
            }

            .nav-left {
                left: 10px;
            }

            .nav-right {
                right: 10px;
            }

            .mode-toggle {
                width: 40px;
                height: 40px;
                font-size: 1rem;
                top: 10px;
                right: 10px;
            }
        }
    </style>
</head>

<body>
    <div id="webgl-container"></div>

    <div class="ui-layer">
        <input type="text" id="searchInput" class="search-input" placeholder="検索 (キーワード)" autocomplete="off">
        <div class="mode-toggle" id="modeToggle" title="モード切り替え (スペースキー)">🌙</div>
        <div class="info-panel" id="infoPanel">
            <div class="date-info" id="dateInfo">日記を選択してください</div>
            <div class="stats-info" id="statsInfo"></div>
        </div>
    </div>

    <div class="nav-button nav-left" id="navLeft">◀</div>
    <div class="nav-button nav-right" id="navRight">▶</div>

    <script src="webgl-3d-engine.js"></script>
    <script>
        class DiaryUtils {
            static toKanjiNumber(num) {
                const kanjiNumbers = ['〇', '一', '二', '三', '四', '五', '六', '七', '八', '九'];
                return num.toString().split('').map(digit => kanjiNumbers[digit]).join('');
            }

            static toKanjiMonth(month) {
                const kanjiMonths = ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];
                return kanjiMonths[month - 1];
            }

            static toKanjiDay(day) {
                const days = ['', '一', '二', '三', '四', '五', '六', '七', '八', '九', '十', '十一', '十二', '十三', '十四', '十五', '十六', '十七', '十八', '十九', '二十', '二十一', '二十二', '二十三', '二十四', '二十五', '二十六', '二十七', '二十八', '二十九', '三十', '三十一'];
                return days[day];
            }

            static toJapaneseEra(year) {
                const eras = [
                    { name: '令和', start: 2019, offset: 2018 },
                    { name: '平成', start: 1989, offset: 1988 },
                    { name: '昭和', start: 1926, offset: 1925 },
                    { name: '大正', start: 1912, offset: 1911 },
                    { name: '明治', start: 1868, offset: 1867 }
                ];
                const era = eras.find(e => year >= e.start);
                const eraYear = year - era.offset;
                return `${era.name}${this.toKanjiNumber(eraYear)}年`;
            }

            static formatJapaneseDate(yyyymmdd) {
                const year = parseInt(yyyymmdd.substring(0, 4), 10);
                const month = parseInt(yyyymmdd.substring(4, 6), 10);
                const day = parseInt(yyyymmdd.substring(6, 8), 10);
                const date = new Date(year, month - 1, day);
                const dayOfWeek = ['日', '月', '火', '水', '木', '金', '土'][date.getDay()];
                return {
                    short: `${this.toKanjiMonth(month)}${this.toKanjiDay(day)}日　${DiaryApp.isFakeMode ? '裏日記' : dayOfWeek + "曜日"}`,
                    long: `${this.toJapaneseEra(year)}${this.toKanjiMonth(month)}${this.toKanjiDay(day)}日（${DiaryApp.isFakeMode ? '裏' : dayOfWeek}）`
                };
            }

            static escapeRegExp(string) {
                return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }
        }

        class DiaryApp {
            static isFakeMode = false;
            static fakeEntriesCache = null;
            static diaryEntries = [];
            static weatherData = [];
            static renderer = null;
            static currentEntry = null;

            static async init() {
                // WebGL初期化
                const container = document.getElementById('webgl-container');
                this.renderer = new WebGL3DTextRenderer(container, {
                    fontSize: 48,
                    fontFamily: 'gojiromanus, serif',
                    textColor: 0x8fbcf2,
                    backgroundColor: 0x271f2c,
                    verticalMode: true,
                    particleCount: 30,
                    perspective: 1200
                });

                // データ読み込み
                await this.loadWeatherData();
                await this.loadDiaryEntries();
                this.preloadFakeEntries();
                this.setupEventListeners();
                this.updateThemeColor(!this.isFakeMode);

                await document.fonts.ready;
                document.body.classList.add('loaded');

                this.setupWheelNavigation();
                this.setupNavButtons();
                this.setupSearch();
                this.setupModeToggle();
                this.scrollToEntryFromHash();
            }

            static updateThemeColor(isLight) {
                const metaThemeColor = document.querySelector('meta[name="theme-color"]');
                if (!metaThemeColor) return;

                const bgColor = isLight ? '#271f2c' : '#19100d';
                metaThemeColor.setAttribute('content', bgColor);
            }

            static async loadWeatherData() {
                try {
                    const response = await fetch('weather.csv');
                    if (!response.ok) return;
                    const text = await response.text();
                    const lines = text.split('\n').filter(line => line.trim());
                    this.weatherData = lines.slice(1).map(line => {
                        const [date, avgTemp, avgWind] = line.split(',').map(v => v.trim());
                        return { date, avgTemp: parseFloat(avgTemp), avgWind: parseFloat(avgWind) };
                    });
                } catch (error) {
                    console.error('Error loading weather data:', error);
                }
            }

            static async loadDiaryEntries(filename = 'entry.md') {
                try {
                    const response = await fetch(filename);
                    if (!response.ok) throw new Error(`Failed to load ${filename}: ${response.status}`);
                    const text = await response.text();
                    this.renderEntries(text);
                } catch (error) {
                    console.error(`Error loading ${filename}:`, error);
                }
            }

            static renderEntries(text) {
                this.diaryEntries = [];
                const entries = text.split('---').filter(entry => entry.trim());
                entries.reverse().forEach(entry => {
                    const dateMatch = entry.match(/date:\s*(.*)/);
                    const contentMatch = entry.match(/content:\s*\|\s*\n([\s\S]*?)(?=\n---|\n$|$)/m);
                    if (!dateMatch || !contentMatch) return;

                    const yyyymmdd = dateMatch[1].trim();
                    const dateObj = DiaryUtils.formatJapaneseDate(yyyymmdd);
                    const contentLines = contentMatch[1].split('\n').map(line => line.replace(/^\s*\|?\s*/, '')).join('\n');
                    const dateForIcons = `${yyyymmdd.substring(0, 4)}/${yyyymmdd.substring(4, 6)}/${yyyymmdd.substring(6, 8)}`;

                    const charCount = contentLines.replace(/\s+/g, '').length;
                    const weather = this.weatherData ? this.weatherData.find(w => w.date === dateForIcons) : null;
                    const tempInfo = weather ? `${weather.avgTemp}度` : '-';
                    const windInfo = weather ? `毎秒${weather.avgWind}メートル` : '-';

                    this.diaryEntries.push({
                        yyyymmdd,
                        dateObj,
                        content: contentLines.trim(),
                        charCount,
                        tempInfo,
                        windInfo,
                        weather
                    });
                });
            }

            static setupEventListeners() {
                document.addEventListener('keydown', e => this.handleKeyDown(e));
                window.addEventListener('hashchange', () => this.scrollToEntryFromHash());
                window.addEventListener('load', () => this.scrollToEntryFromHash());
            }

            static handleKeyDown(e) {
                if (e.key === ' ') {
                    e.preventDefault();
                    this.toggleFakeMode();
                    return;
                }

                const currentIndex = this.diaryEntries.findIndex(entry => entry.yyyymmdd === this.currentEntry?.yyyymmdd);
                if (currentIndex === -1) return;

                if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                    const nextEntry = this.diaryEntries[currentIndex + 1];
                    if (nextEntry) window.location.hash = nextEntry.yyyymmdd;
                } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                    const prevEntry = this.diaryEntries[currentIndex - 1];
                    if (prevEntry) window.location.hash = prevEntry.yyyymmdd;
                }
            }

            static setupWheelNavigation() {
                document.addEventListener('wheel', (e) => {
                    if (!this.currentEntry) return;
                    const currentIndex = this.diaryEntries.findIndex(entry => entry.yyyymmdd === this.currentEntry.yyyymmdd);
                    if (currentIndex === -1) return;

                    const direction = e.deltaY > 0 ? 1 : -1;
                    const nextIndex = currentIndex + direction;
                    if (nextIndex >= 0 && nextIndex < this.diaryEntries.length) {
                        window.location.hash = this.diaryEntries[nextIndex].yyyymmdd;
                    }
                }, { passive: true });
            }

            static setupNavButtons() {
                document.getElementById('navLeft').addEventListener('click', () => {
                    if (!this.currentEntry) return;
                    const currentIndex = this.diaryEntries.findIndex(entry => entry.yyyymmdd === this.currentEntry.yyyymmdd);
                    if (currentIndex < this.diaryEntries.length - 1) {
                        window.location.hash = this.diaryEntries[currentIndex + 1].yyyymmdd;
                    }
                });

                document.getElementById('navRight').addEventListener('click', () => {
                    if (!this.currentEntry) return;
                    const currentIndex = this.diaryEntries.findIndex(entry => entry.yyyymmdd === this.currentEntry.yyyymmdd);
                    if (currentIndex > 0) {
                        window.location.hash = this.diaryEntries[currentIndex - 1].yyyymmdd;
                    }
                });
            }

            static setupModeToggle() {
                document.getElementById('modeToggle').addEventListener('click', () => {
                    this.toggleFakeMode();
                });
            }

            static setupSearch() {
                const searchInput = document.getElementById('searchInput');
                searchInput.addEventListener('input', (e) => {
                    const query = e.target.value.toLowerCase();
                    if (query.length === 0) {
                        this.scrollToEntryFromHash();
                        return;
                    }

                    const matchingEntry = this.diaryEntries.find(entry =>
                        entry.content.toLowerCase().includes(query)
                    );

                    if (matchingEntry) {
                        window.location.hash = matchingEntry.yyyymmdd;
                    }
                });
            }

            static scrollToEntryFromHash() {
                const hash = window.location.hash.substring(1);
                let entry = null;

                if (hash && hash.match(/^\d{8}$/)) {
                    entry = this.diaryEntries.find(e => e.yyyymmdd === hash);
                }

                if (!entry && this.diaryEntries.length > 0) {
                    entry = this.diaryEntries[0];
                }

                if (entry) {
                    this.currentEntry = entry;
                    this.displayEntry(entry);
                    this.updateInfoPanel(entry);
                    this.renderer.triggerGlitch();
                }
            }

            static displayEntry(entry) {
                if (this.renderer) {
                    this.renderer.renderText(entry.content);

                    // 天気に基づいて色を変更
                    if (entry.weather) {
                        const temp = entry.weather.avgTemp;
                        const red = Math.min(255, Math.floor((temp + 10) * 10));
                        const blue = Math.min(255, Math.floor((35 - temp) * 10));
                        const colorString = `rgb(${red}, 50, ${blue})`;
                        const hex = ((red << 16) | (50 << 8) | blue).toString(16).padStart(6, '0');
                        this.renderer.setTextColor('#' + hex);
                    }

                    // 3D回転アニメーション
                    const randomRotX = (Math.random() - 0.5) * 0.3;
                    const randomRotY = (Math.random() - 0.5) * 0.3;
                    this.renderer.setTargetRotation(randomRotX, randomRotY);
                }
            }

            static updateInfoPanel(entry) {
                const dateInfo = document.getElementById('dateInfo');
                const statsInfo = document.getElementById('statsInfo');

                dateInfo.textContent = entry.dateObj.long;
                statsInfo.innerHTML = `
                    <div>📊 気温: ${entry.tempInfo}</div>
                    <div>💨 風速: ${entry.windInfo}</div>
                    <div>📝 文字数: ${entry.charCount}</div>
                `;
            }

            static toggleFakeMode() {
                this.isFakeMode = !this.isFakeMode;
                const body = document.body;
                const modeToggle = document.getElementById('modeToggle');

                this.updateThemeColor(!this.isFakeMode);
                body.classList.toggle('fake-mode', this.isFakeMode);
                modeToggle.textContent = this.isFakeMode ? '☀️' : '🌙';

                const bgColor = this.isFakeMode ? 0x19100d : 0x271f2c;
                const textColor = this.isFakeMode ? 0xa7be80 : 0x8fbcf2;

                if (this.renderer) {
                    this.renderer.setBackgroundColor(bgColor);
                    this.renderer.setTextColor(textColor);
                    this.renderer.triggerGlitch();
                }

                if (this.isFakeMode) {
                    if (this.fakeEntriesCache) {
                        this.renderEntries(this.fakeEntriesCache);
                    } else {
                        this.loadDiaryEntries('fake.md');
                    }
                } else {
                    this.loadDiaryEntries('entry.md');
                }

                this.scrollToEntryFromHash();
            }

            static async preloadFakeEntries() {
                try {
                    const response = await fetch('fake.md');
                    if (response.ok) this.fakeEntriesCache = await response.text();
                } catch (error) {
                    console.error('Error preloading fake entries:', error);
                }
            }
        }

        // 初期化
        DiaryApp.init();
    </script>
</body>

</html>
