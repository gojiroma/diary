<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" id="theme-color" content="#ffffff">
    <title>Theme Color Changer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            text-align: center;
        }
    </style>
</head>

<body>
    <h1>Theme Color Changer</h1>
    <p>このページのtheme-colorが0.1秒ごとにランダムに変わります。</p>

    <script>
        function getRandomColor() {
            const letters = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        function updateThemeColor() {
            const metaThemeColor = document.getElementById('theme-color');
            metaThemeColor.setAttribute('content', getRandomColor());
        }

        // 0.5秒ごとにtheme-colorを更新
        setInterval(updateThemeColor, 100);
    </script>
</body>

</html>
